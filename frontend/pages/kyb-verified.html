<!DOCTYPE html>
<html lang="ko">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InvoiceX - KYB 심사</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet" />

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f8fafc;
        color: #0f172a;
        font-family: Inter, Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
    </style>
  </head>

  <body>
    <main class="min-h-screen bg-[#F8FAFC] px-6 py-[96px]">
      <section class="relative mx-auto w-[900px] text-center">
        <button id="backToMypage" type="button"
          class="absolute left-0 top-[-2px] text-[34px] font-bold leading-none text-[#0F172A] hover:text-[#2563EB]"
          aria-label="마이페이지로 돌아가기">
          &larr;
        </button>

        <h1 class="text-[30px] font-bold leading-none tracking-[-0.02em] text-[#0F172A]">
          KYB 기업 인증
        </h1>

        <p class="mt-[14px] text-[14px] font-normal text-[#64748B]">
          제출된 증명 서류를 기준으로 기업 인증 심사를 진행합니다.
        </p>
      </section>

      <section class="mx-auto mt-[40px] w-[430px]">
        <div class="relative h-[48px]">
          <div class="absolute left-[25px] top-[10px] h-[2px] w-[382px] bg-[#4F63E6]"></div>

          <div class="absolute left-0 top-0 flex flex-col items-center">
            <div class="flex h-[22px] w-[22px] items-center justify-center rounded-full bg-[#4F63E6]">
              <span class="text-[12px] font-extrabold text-white">✓</span>
            </div>

            <span class="mt-[7px] whitespace-nowrap text-[13px] font-bold text-[#0F172A]">
              증명 서류 제출
            </span>
          </div>

          <div class="absolute right-0 top-0 flex flex-col items-center">
            <div
              class="flex h-[22px] w-[22px] items-center justify-center rounded-full border-[4px] border-[#4F63E6] bg-white">
              <div class="h-[6px] w-[6px] rounded-full bg-[#4F63E6]"></div>
            </div>

            <span class="mt-[7px] whitespace-nowrap text-[13px] font-bold text-[#0F172A]">
              심사 및 완료
            </span>
          </div>
        </div>
      </section>

      <section
        class="mx-auto mt-[34px] flex h-[470px] w-[900px] flex-col items-center justify-center rounded-[16px] border border-[#E2E8F0] bg-white px-[24px] py-[28px] text-center">
        <div id="statusIcon"
          class="flex h-[60px] w-[60px] items-center justify-center rounded-full bg-[#EFF6FF] text-[28px] font-extrabold text-[#4F63E6]">
          …
        </div>

        <h2 id="statusTitle" class="mt-6 text-[24px] font-extrabold text-[#0F172A]">
          현재 KYB 기업 인증을 심사 중입니다...
        </h2>

        <p id="statusDescription" class="mt-3 text-[14px] leading-6 text-[#64748B]">
          Agent가 제출 서류와 기업 정보를 대조하고 있습니다.
        </p>
      </section>
    </main>

    <script>
      const roleParam = new URLSearchParams(location.search).get("role") || "funder";

      document.getElementById("backToMypage").addEventListener("click", () => {
        location.href = "mypage.html?role=" + roleParam;
      });

      setTimeout(() => {
        localStorage.setItem("ix_kyb_verified", "true");
        document.getElementById("statusIcon").textContent = "✓";
        document.getElementById("statusIcon").className = "flex h-[60px] w-[60px] items-center justify-center rounded-full bg-[#DCFCE7] text-[28px] font-extrabold text-[#16A34A]";
        document.getElementById("statusTitle").textContent = "인증 완료되었습니다!";
        document.getElementById("statusDescription").textContent = "마이페이지로 이동합니다.";

        setTimeout(() => {
          location.href = "mypage.html?role=" + roleParam;
        }, 3000);
      }, 5000);
    </script>
  </body>

</html>
