<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 | InvoiceX</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="auth-page">
    <header class="auth-header">
        <a href="../start.html" class="auth-logo">InvoiceX</a>
    </header>
  <main>
    <article class="auth-card">
      <section class="auth-panel">
        <h1>로그인</h1>
        <p>Invoice X 서비스 이용을 위해 로그인하세요.</p>
      </section>

      <form class="auth-form" action="#" method="post">
        <div class="field-group">
          <label for="email">이메일 주소</label>
          <input id="email" name="email" type="email" placeholder="example@company.com" required>
        </div>
        <div class="field-group">
          <label for="password">비밀번호</label>
          <input id="password" name="password" type="password" placeholder="••••••••" required>
        </div>
        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="remember" name="remember">
            로그인 상태 유지
          </label>
          <a href="#" class="forgot-password">비밀번호를 잊으셨나요?</a>
        </div>
        <button class="btn btn-primary" type="submit">로그인하기</button>
        <div class="form-divider">
          <span>또는</span>
        </div>
        <p class="form-note">계정이 없으신가요? <a href="signup.html">회원가입</a></p>
      </form>
    </article>
  </main>
</body>
</html>
