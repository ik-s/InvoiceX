<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InvoiceX - 로그인</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-[#f6f8fc] font-sans text-[#171923]">
  <!-- Header -->
  <header class="flex h-[39px] w-full items-center justify-center border-b border-[#e5e8f0] bg-white">
    <a
      href="start.html"
      class="text-[14px] font-extrabold tracking-[-0.02em] text-[#2563eb] no-underline"
    >
      InvoiceX
    </a>
  </header>

  <!-- Login Main -->
  <main class="flex min-h-[calc(100vh-39px)] items-center justify-center px-6 py-24 max-sm:py-16">
    <article class="w-full max-w-[360px] rounded-2xl border border-[#e1e5ee] bg-white px-10 py-8 shadow-[0_10px_28px_rgba(22,31,51,0.03)]">
      <!-- Title -->
      <section class="mb-6 text-center">
        <h1 class="mb-2 text-[24px] font-extrabold leading-tight tracking-tight text-[#151923]">
          로그인
        </h1>
        <p class="text-[13px] leading-relaxed tracking-tight text-[#7b8494]">
          InvoiceX 서비스 이용을 위해 로그인하세요.
        </p>
      </section>

      <!-- Form -->
      <form action="#" method="post" class="flex flex-col">
        <!-- Email Field -->
        <div class="mb-4">
          <label
            for="email"
            class="mb-2 block text-[12px] font-bold tracking-tight text-[#242936]"
          >
            이메일 주소
          </label>
          <input
            id="email"
            name="email"
            type="email"
            placeholder="example@invoicex.io"
            required
            class="h-11 w-full rounded-lg border border-[#d9dee8] bg-[#f9fafc] px-3 text-[13px] text-[#2c3340] outline-none placeholder:text-[#a5adbb] transition-colors duration-200 focus:border-[#536be8] focus:bg-white focus:ring-1 focus:ring-[#536be8]/50"
          />
        </div>

        <!-- Password Field -->
        <div class="mb-5">
          <label
            for="password"
            class="mb-2 block text-[12px] font-bold tracking-tight text-[#242936]"
          >
            비밀번호
          </label>
          <input
            id="password"
            name="password"
            type="password"
            placeholder="••••••••••"
            required
            class="h-11 w-full rounded-lg border border-[#d9dee8] bg-[#f9fafc] px-3 text-[13px] text-[#2c3340] outline-none placeholder:text-[#a5adbb] transition-colors duration-200 focus:border-[#536be8] focus:bg-white focus:ring-1 focus:ring-[#536be8]/50"
          />
        </div>

        <!-- Role Selection -->
        <div class="mb-5">
          <label class="mb-3 block text-[12px] font-bold tracking-tight text-[#242936]">
            역할 선택
          </label>
          <div class="grid grid-cols-1 gap-2">
            <label class="role-option cursor-pointer rounded-lg border-2 border-[#d9dee8] bg-[#f9fafc] p-3 text-center text-[13px] font-semibold text-[#a5adbb] transition-all duration-200 hover:border-[#536be8] hover:bg-[#f0f4ff] hover:text-[#536be8] peer-checked:border-[#2563eb] peer-checked:bg-[#2563eb] peer-checked:text-white">
              <input
                type="radio"
                name="role"
                value="invoice"
                required
                class="sr-only peer"
              />
              인보이스 등록
            </label>
            <label class="role-option cursor-pointer rounded-lg border-2 border-[#d9dee8] bg-[#f9fafc] p-3 text-center text-[13px] font-semibold text-[#a5adbb] transition-all duration-200 hover:border-[#536be8] hover:bg-[#f0f4ff] hover:text-[#536be8] peer-checked:border-[#2563eb] peer-checked:bg-[#2563eb] peer-checked:text-white">
              <input
                type="radio"
                name="role"
                value="rwa"
                class="sr-only peer"
              />
              RWA 참여
            </label>
            <label class="role-option cursor-pointer rounded-lg border-2 border-[#d9dee8] bg-[#f9fafc] p-3 text-center text-[13px] font-semibold text-[#a5adbb] transition-all duration-200 hover:border-[#536be8] hover:bg-[#f0f4ff] hover:text-[#536be8] peer-checked:border-[#2563eb] peer-checked:bg-[#2563eb] peer-checked:text-white">
              <input
                type="radio"
                name="role"
                value="payment"
                class="sr-only peer"
              />
              대금 지급
            </label>
          </div>
        </div>

        <!-- Options -->
        <div class="mb-6 flex items-center justify-between gap-2">
          <label class="flex cursor-pointer items-center gap-2 text-[11px] text-[#7c8492]">
            <input
              type="checkbox"
              id="remember"
              name="remember"
              class="h-4 w-4 cursor-pointer rounded border-[#d9dee8] accent-[#2563eb]"
            />
            로그인 상태 유지
          </label>

          <a href="#" class="text-[11px] font-semibold text-[#4b5fe5] hover:text-[#3d4db8] no-underline transition-colors">
            비밀번호를 잊으셨나요?
          </a>
        </div>

        <!-- Login Button -->
        <button
          type="submit"
          class="mb-4 h-11 w-full rounded-lg bg-[#2563eb] text-[14px] font-bold text-white shadow-[0_4px_12px_rgba(37,99,235,0.25)] transition-all duration-200 hover:bg-[#1d4ed8] hover:shadow-[0_6px_16px_rgba(37,99,235,0.3)] active:bg-[#1e40af]"
        >
          로그인하기
        </button>

        <!-- Divider -->
        <div class="mb-4 flex items-center gap-3">
          <div class="h-px flex-1 bg-[#e4e7ef]"></div>
          <span class="text-[11px] text-[#a3aab7]">또는</span>
          <div class="h-px flex-1 bg-[#e4e7ef]"></div>
        </div>

        <!-- Signup Link -->
        <p class="m-0 text-center text-[12px] text-[#7d8594]">
          계정이 없으신가요?
          <a href="signup.html" class="font-bold text-[#4b5fe5] hover:text-[#3d4db8] no-underline transition-colors">
            회원가입
          </a>
        </p>
      </form>
    </article>
  </main>

  <script>
    const loginForm = document.querySelector('form');
    loginForm.addEventListener('submit', function(event) {
      event.preventDefault();
      const email = document.querySelector('#email').value.trim();
      const password = document.querySelector('#password').value.trim();
      const role = document.querySelector('input[name="role"]:checked');

      if (!email || !password) {
        alert('이메일과 비밀번호를 모두 입력해주세요.');
        return;
      }

      if (!role) {
        alert('역할을 선택해주세요.');
        return;
      }

      // 로그인 성공 처리
      localStorage.setItem("ix_logged_in", "true");
      localStorage.setItem("ix_user_role", role.value);

    // 로그인 후 마이페이지로 이동
      window.location.href = "mypage.html?role=" + role.value;
    });

    // 역할 선택 시각적 효과
    const roleOptions = document.querySelectorAll('.role-option');
    roleOptions.forEach(option => {
      const radio = option.querySelector('input[type="radio"]');
      radio.addEventListener('change', function() {
        // 모든 옵션 초기화
        roleOptions.forEach(opt => {
          opt.classList.remove('border-[#2563eb]', 'bg-[#2563eb]', 'text-white');
          opt.classList.add('border-[#d9dee8]', 'bg-[#f9fafc]', 'text-[#a5adbb]');
        });

        // 선택된 옵션 스타일 적용
        if (this.checked) {
          option.classList.remove('border-[#d9dee8]', 'bg-[#f9fafc]', 'text-[#a5adbb]');
          option.classList.add('border-[#2563eb]', 'bg-[#2563eb]', 'text-white');
        }
      });
    });
  </script>
</body>
</html>
