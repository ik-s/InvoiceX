<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvoiceX - 통합 대시보드</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: "Pretendard", sans-serif; font-weight: 300; -webkit-font-smoothing: antialiased; letter-spacing: -0.02em; background-color: #f8fafc; }
        
        .font-bold { font-weight: 600 !important; }
        .font-medium { font-weight: 500 !important; }
        
        @keyframes slideDown { from { opacity: 1; max-height: 100px; padding: 16px; margin-bottom: 8px; } to { opacity: 0; max-height: 0; padding: 0; margin-bottom: 0; border-width: 0; } }
        .alert-read { animation: slideDown .4s ease forwards; overflow: hidden; pointer-events: none; }
        .red-dot { width: 5px; height: 5px; border-radius: 50%; background: #ef4444; flex-shrink: 0; }
        
        .rwa-slider { display: flex; overflow-x: auto; gap: 1rem; padding-bottom: 0.5rem; scroll-behavior: smooth; scroll-snap-type: x mandatory; }
        .rwa-card { flex: 0 0 280px; scroll-snap-align: start; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #e5e7eb; }
        .rwa-card:hover { transform: translateY(-3px); border-color: #3b82f6; box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.08); }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .saas-card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.03); }
    </style>
</head>
<body class="text-gray-900">

    <nav class="fixed top-0 left-0 w-full bg-white border-b border-gray-100 z-50 h-14 flex items-center">
        <div class="max-w-7xl mx-auto w-full flex items-center justify-between px-6">
            <div class="flex items-center space-x-10">
                <div class="text-blue-600 text-2xl font-bold cursor-pointer" onclick="location.href='mypage.html'">InvoiceX</div>
                <div id="nav-menu" class="hidden md:flex space-x-8 text-sm font-bold text-gray-500">
                </div>
            </div>
            
            <button onclick="location.href='role-select.html'" class="text-xs font-bold text-gray-400 hover:text-red-500 transition flex items-center gap-1.5">
                로그아웃
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
            </button>
        </div>
    </nav>

    <main class="pt-20 pb-16 max-w-7xl mx-auto px-6">
        
        <section class="saas-card p-6 mb-8 flex items-center justify-between animate-fade-up">
            <div class="flex items-center gap-5">
                <div class="w-14 h-14 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center flex-shrink-0 shadow-inner">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-gray-900 mb-1">InvoiceX</h1>
                    <div id="kyb-status" class="text-gray-400 text-xs font-medium flex items-center gap-1.5 uppercase"></div>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <span id="role-badge" class="bg-blue-600 text-white px-8 h-11 inline-flex items-center justify-center rounded-xl text-sm font-medium shadow-sm">역할</span>
                <button onclick="location.href='kyb.html'" class="bg-gray-900 hover:bg-black text-white px-8 h-11 inline-flex items-center justify-center rounded-xl text-sm font-medium transition gap-2 shadow-md">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
                    지갑 연결
                </button>
            </div>
        </section>

        <div id="main-content" class="hidden">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                
                <div class="lg:col-span-8 space-y-8">
                    <div id="rwa-section">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="text-lg font-bold text-gray-900 uppercase tracking-wider">진행 중인 RWA</h2>
                            <div class="flex gap-1">
                                <button onclick="scrollRWA(-296)" class="w-7 h-7 rounded-full border border-gray-200 flex items-center justify-center text-gray-400 hover:bg-gray-100 transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg></button>
                                <button onclick="scrollRWA(296)" class="w-7 h-7 rounded-full border border-gray-200 flex items-center justify-center text-gray-400 hover:bg-gray-100 transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg></button>
                            </div>
                        </div>
                        <div id="rwa-slider" class="rwa-slider no-scrollbar"></div>
                    </div>

                    <div class="saas-card overflow-hidden">
                        <div class="flex border-b border-gray-100 bg-gray-50 px-1" id="tab-headers"></div>
                        <div id="tab-content" class="p-8"></div>
                    </div>
                </div>

                <div class="lg:col-span-4">
                    <div class="saas-card sticky top-20 overflow-hidden shadow-sm">
                        <div class="px-5 py-4 border-b border-gray-50 flex justify-between items-center">
                            <h2 class="text-lg font-bold text-gray-900 uppercase tracking-wider">최신 알림</h2>
                            <button onclick="openReadHistory()" class="text-xs font-medium text-gray-400 hover:text-blue-600 transition">알림확인</button>
                        </div>
                        <div id="alert-list" class="divide-y divide-gray-50 min-h-[300px]"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="kyb-notice" class="hidden saas-card p-16 text-center mt-8 max-w-xl mx-auto">
            <h2 class="text-xl font-bold text-gray-900 mb-2">기업 인증이 필요합니다</h2>
            <p class="text-sm text-gray-500 font-medium mb-8 leading-relaxed">InvoiceX의 모든 기능을 이용하시려면<br>기업 인증(KYB)을 먼저 완료해 주세요.</p>
            <button onclick="window.location.href='kyb.html'" class="px-8 py-3 bg-blue-600 text-white rounded-xl font-bold text-sm hover:bg-blue-700 transition">KYB 인증 시작하기</button>
        </div>
    </main>

    <div id="modal-overlay" class="fixed inset-0 bg-black bg-opacity-40 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div id="modal-container" class="bg-white w-full max-w-sm rounded-2xl p-8 shadow-2xl transform transition-all scale-95 opacity-0 duration-300"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const role = params.get('role') || 'funder';
        const isKyb = params.get('kyb') !== 'false';

        const ROLE_DATA = {
            funder: { label: '자금공급자', nav: [{n:'마이페이지', l:'mypage.html?role=funder'}, {n:'RWA 마켓', l:'rwamarket.html'}], tabs: ['포트폴리오', '정산 내역'] },
            registrar: { label: '인보이스 등록자', nav: [{n:'마이페이지', l:'mypage.html?role=registrar'}, {n:'인보이스 등록', l:'register.html'}], tabs: ['대금 수령', '등록 현황'] },
            payer: { label: '대금지급기업', nav: [{n:'마이페이지', l:'mypage.html?role=payer'}, {n:'인보이스 확인', l:'invoice.html'}, {n:'대금지급', l:'payment.html'}], tabs: ['채무 현황', '지급 스케줄'] }
        };

        let alerts = [
            { id: 1, title: "정산 완료 안내", content: "인보이스 #INV-0042 건의 정산이 지갑으로 완료되었습니다.", time: "방금 전" },
            { id: 2, title: "신규 RWA 등록", content: "투자 마켓에 '현대자동차 공급망 매출채권' 상품이 새롭게 등록되었습니다.", time: "2시간 전" }
        ];
        let historyAlerts = [];

        function init() {
            const config = ROLE_DATA[role];
            document.getElementById('role-badge').innerText = config.label;
            
            if (isKyb) {
                document.getElementById('kyb-status').innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-blue-600"></span>KYB 인증 완료`;
                document.getElementById('main-content').classList.remove('hidden');
                renderNav(config.nav);
                renderAlerts();
                if(role !== 'payer') renderRWA(); else document.getElementById('rwa-section').style.display='none';
                renderTabs(config.tabs);
            } else {
                document.getElementById('kyb-status').innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-red-500"></span>인증 미완료`;
                document.getElementById('kyb-notice').classList.remove('hidden');
            }
        }

        function renderNav(list) {
            document.getElementById('nav-menu').innerHTML = list.map(m => 
                `<a href="${m.l}" class="hover:text-blue-600 transition ${m.n==='마이페이지'?'text-blue-600 font-bold':'font-medium'}">${m.n}</a>`
            ).join('');
        }

        function renderAlerts() {
            const list = document.getElementById('alert-list');
            if(!alerts.length) { list.innerHTML = `<p class="text-center py-16 text-gray-400 font-bold text-sm">새로운 알림이 없습니다.</p>`; return; }
            list.innerHTML = alerts.map(a => `
                <div id="alert-${a.id}" class="p-5 bg-white hover:bg-gray-50 transition cursor-pointer flex items-start gap-3" onclick="clickAlert(${a.id})">
                    <div class="red-dot mt-1.5"></div>
                    <div class="flex-1">
                        <p class="text-sm font-bold text-gray-900 mb-1 leading-tight">${a.title}</p>
                        <p class="text-xs text-gray-500 truncate">${a.content}</p>
                        <span class="text-xs text-gray-400 font-medium mt-1.5 block">${a.time}</span>
                    </div>
                </div>`).join('');
        }

        function clickAlert(id) {
            const el = document.getElementById(`alert-${id}`); el.classList.add('alert-read');
            const data = alerts.find(x => x.id === id);
            setTimeout(() => {
                historyAlerts.push(data); alerts = alerts.filter(x => x.id !== id);
                renderAlerts(); openInfoModal(data.title, data.content);
            }, 500);
        }

        function renderRWA() {
            const slider = document.getElementById('rwa-slider');
            const rwas = [
                { id: 'INV-0042', title: '삼성전자 매출채권', d: 'D-45', p: '75%', a: '8.5%' },
                { id: 'INV-0035', title: '현대자동차 부품대금', d: 'D-29', p: '50%', a: '7.2%' },
                { id: 'INV-0088', title: 'LG디스플레이 공급망', d: 'D-12', p: '90%', a: '9.1%' }
            ];
            slider.innerHTML = rwas.map(i => `
                <div class="rwa-card bg-white p-5 rounded-2xl cursor-pointer flex-shrink-0" onclick="openRWADetail('${i.id}', '${i.title}', '${i.a}')">
                    <div class="flex justify-between items-start mb-3">
                        <span class="text-xs font-medium text-gray-400">#${i.id}</span>
                        <span class="text-blue-600 text-sm font-bold">${i.d}</span>
                    </div>
                    <h3 class="font-bold text-base text-gray-900 mb-3">${i.title}</h3>
                    <div class="w-full bg-gray-100 h-1.5 rounded-full overflow-hidden mb-2"><div class="bg-blue-600 h-full" style="width:${i.p}"></div></div>
                    <p class="text-xs text-gray-400 font-medium">수익률 <span class="font-bold">${i.a}</span></p>
                </div>`).join('');
        }
        function scrollRWA(amt) { document.getElementById('rwa-slider').scrollBy({ left: amt, behavior: 'smooth' }); }

        function renderTabs(tabs) {
            document.getElementById('tab-headers').innerHTML = tabs.map((t, i) => `
                <button id="tab-btn-${i}" onclick="switchTab(${i})" class="flex-1 py-4 text-sm font-bold transition ${i===0?'text-blue-600 border-b-2 border-blue-600 bg-white':'text-gray-400 bg-gray-50 font-medium'}">${t}</button>
            `).join('');
            switchTab(0);
        }

        function switchTab(idx) {
            document.querySelectorAll('[id^="tab-btn-"]').forEach((btn, i) => {
                if(i === idx) btn.className = "flex-1 py-4 text-sm text-blue-600 border-b-2 border-blue-600 bg-white font-bold transition";
                else btn.className = "flex-1 py-4 text-sm text-gray-400 bg-gray-50 font-medium hover:text-gray-600 transition";
            });

            const content = document.getElementById('tab-content');
            
            if (role === 'funder') {
                if (idx === 0) {
                    content.innerHTML = `
                        <div class="grid grid-cols-2 gap-6 mb-8 font-bold">
                            <div class="p-6 bg-gray-50 rounded-2xl border border-gray-100"><p class="text-sm text-gray-400 mb-2 uppercase font-medium">출금 가능 잔액</p><p class="text-4xl text-gray-900 tracking-tighter">50,155 <span class="text-base font-medium text-gray-400">RLUSD</span></p></div>
                            <div class="p-6 bg-blue-50 rounded-2xl border border-blue-100"><p class="text-sm text-blue-600 mb-2 uppercase font-medium">누적 실현 수익</p><p class="text-3xl text-blue-700 tracking-tighter">+ 1,240 <span class="text-base font-medium text-blue-400">RLUSD</span></p></div>
                        </div>
                        <div class="mb-8"><h4 class="font-bold text-sm text-gray-400 mb-3 uppercase tracking-widest">📊 나의 투자 업종 비중</h4><div class="flex h-2.5 rounded-full overflow-hidden"><div class="bg-gray-900 w-[60%]"></div><div class="bg-blue-600 w-[30%]"></div><div class="bg-gray-200 w-[10%]"></div></div><div class="flex gap-4 mt-2.5 text-xs font-medium text-gray-400 uppercase"><span>● IT/반도체 60%</span><span>● 자동차 30%</span><span>● 기타 10%</span></div></div>
                        <button onclick="openActionModal('withdraw')" class="w-full py-4 bg-blue-600 text-white rounded-xl font-bold text-sm hover:bg-blue-700 transition shadow-md shadow-blue-100">지갑으로 출금하기</button>`;
                } else {
                    content.innerHTML = `<div class="overflow-x-auto"><table class="w-full text-left text-sm font-medium"><thead class="text-gray-400 text-xs uppercase border-b border-gray-100 font-bold"><tr><th class="pb-3">항목</th><th class="pb-3 text-right">상태/금액</th></tr></thead><tbody class="divide-y divide-gray-50 text-gray-800"><tr><td class="py-4">삼성전자 #0042</td><td class="py-4 text-right text-blue-600 font-bold">+ 12,000 RLUSD</td></tr><tr><td class="py-4">현대차 #0021</td><td class="py-4 text-right text-blue-600 font-bold">+ 8,500 RLUSD</td></tr></tbody></table></div>`;
                }
            } else if (role === 'registrar') {
                if (idx === 0) {
                    content.innerHTML = `
                        <div class="border border-gray-100 bg-gray-50 p-6 rounded-2xl mb-6">
                            <p class="text-sm font-bold text-gray-400 mb-4 uppercase tracking-widest text-center">대금 수령 예상 상세</p>
                            <div class="flex justify-between items-center text-sm font-bold border-b border-gray-200 pb-3 mb-3"><span>인보이스 원금</span><span>₩50,000,000</span></div>
                            <div class="flex justify-between items-center text-sm font-medium border-b border-gray-200 pb-3 mb-3"><span>할인료 및 수수료</span><span class="text-red-500 font-bold">- ₩1,000,000</span></div>
                            <div class="flex justify-between items-center font-bold text-base"><span>실 수령 예정액</span><span class="text-3xl text-blue-600">₩49,000,000</span></div>
                        </div>
                        <div class="p-6 border border-blue-200 rounded-2xl flex justify-between items-center shadow-sm bg-white"><div><p class="font-bold text-base text-gray-900">삼성전자 외 1건</p><p class="text-xs text-gray-400 font-medium mt-0.5">즉시 현금화 가능</p></div><button class="bg-blue-600 text-white px-6 py-3 rounded-xl text-sm font-bold hover:bg-blue-700 transition">수령 실행</button></div>`;
                } else {
                    content.innerHTML = `<div class="overflow-x-auto"><table class="w-full text-left text-sm font-medium"><thead class="text-gray-400 text-xs uppercase border-b border-gray-100 font-bold"><tr><th class="pb-3">등록 건</th><th class="pb-3 text-right">상태</th></tr></thead><tbody class="divide-y divide-gray-50 text-gray-800"><tr><td class="py-4">LG전자 #0192</td><td class="py-4 text-right text-gray-500 font-bold">심사 대기</td></tr></tbody></table></div>`;
                }
            } else if (role === 'payer') {
                if (idx === 0) {
                    content.innerHTML = `
                        <div class="flex items-center justify-between p-6 bg-red-50 border border-red-100 rounded-2xl mb-8">
                            <div><h3 class="text-red-600 font-bold text-base">⚠️ 지급 기일 임박</h3><p class="text-sm font-medium text-red-400 mt-0.5">7일 이내 만기가 도래하는 채무가 있습니다.</p></div>
                            <div class="text-right text-red-600 font-bold"><p class="text-sm uppercase mb-0.5 font-medium">미결제액</p><p class="text-3xl tracking-tighter">₩50,000,000</p></div>
                        </div>
                        <div class="p-6 border border-gray-100 rounded-2xl"><h4 class="font-bold text-sm text-gray-400 mb-5 uppercase tracking-widest">주요 협력사 채무 비중</h4><div class="space-y-4"><div class="flex justify-between text-sm font-medium mb-1"><span class="text-gray-900">(주)한빛테크</span><span class="text-gray-400">40%</span></div><div class="w-full bg-gray-100 h-1.5 rounded-full"><div class="bg-blue-600 h-full w-[40%]"></div></div><div class="flex justify-between text-sm font-medium mb-1"><span class="text-gray-900">기타 협력사</span><span class="text-gray-400">60%</span></div><div class="w-full bg-gray-100 h-1.5 rounded-full"><div class="bg-gray-300 h-full w-[60%]"></div></div></div></div>`;
                } else {
                    content.innerHTML = `<div class="overflow-x-auto"><table class="w-full text-left text-sm font-medium"><thead class="text-gray-400 text-xs uppercase border-b border-gray-100 font-bold"><tr><th class="pb-3">지급 대상</th><th class="pb-3 text-right">예정일/금액</th></tr></thead><tbody class="divide-y divide-gray-50 text-gray-800"><tr><td class="py-4">(주)한빛테크</td><td class="py-4 text-right text-red-600 font-bold">D-3 / ₩20,000,000</td></tr><tr><td class="py-4">기타 협력사</td><td class="py-4 text-right text-gray-600 font-bold">D-15 / ₩30,000,000</td></tr></tbody></table></div>`;
                }
            }
        }

        function openActionModal(type) {
            const con = document.getElementById('modal-container');
            if(type === 'withdraw') {
                con.innerHTML = `<h3 class="text-xl font-bold mb-6 text-center text-gray-900">출금 실행</h3><div class="bg-gray-50 p-6 rounded-2xl mb-6 border border-gray-100 text-center font-bold"><p class="text-sm text-gray-400 mb-1.5 uppercase font-medium">출금 예정 금액</p><p class="text-3xl text-blue-600 tracking-tighter">50,155 <span class="text-lg font-medium">RLUSD</span></p></div><div class="flex gap-3"><button onclick="closeModal()" class="flex-1 py-3.5 bg-gray-100 text-gray-500 rounded-xl text-base font-bold">취소</button><button onclick="executeAction()" class="flex-1 py-3.5 bg-blue-600 text-white rounded-xl text-base font-bold transition hover:bg-blue-700">출금 완료</button></div>`;
                showModal();
            }
        }

        function executeAction() { 
            closeModal(); 
            setTimeout(() => { openInfoModal("처리 완료", "정상적으로 반영되었습니다."); }, 300); 
        }
        
        function openInfoModal(t, c) { 
            const con = document.getElementById('modal-container'); 
            con.innerHTML = `<h3 class="text-xl font-bold text-blue-600 mb-4">${t}</h3><div class="bg-gray-50 p-5 rounded-xl mb-6 text-base text-gray-700 font-medium">${c}</div><button onclick="closeModal()" class="w-full py-3.5 bg-blue-600 text-white rounded-xl text-base font-bold">확인</button>`; 
            showModal(); 
        }
        
        function openRWADetail(id, title, apy) { 
            const con = document.getElementById('modal-container'); 
            con.innerHTML = `<h3 class="text-xl font-bold mb-5">${title}</h3><div class="space-y-3 mb-6 bg-gray-50 p-5 rounded-xl text-sm"><div class="flex justify-between border-b pb-2.5 font-medium"><span class="text-gray-400">ID</span><span class="font-bold text-gray-900">#${id}</span></div><div class="flex justify-between text-blue-600 font-medium"><span>예상 수익률</span><span class="font-bold">${apy}</span></div></div><button onclick="closeModal()" class="w-full py-3.5 bg-gray-900 text-white rounded-xl text-base font-bold">닫기</button>`; 
            showModal(); 
        }
        
        function openReadHistory() { 
            const con = document.getElementById('modal-container'); 
            con.innerHTML = `<h3 class="text-xl font-bold mb-5">확인한 알림</h3><div class="space-y-2.5 mb-6">${historyAlerts.length?historyAlerts.map(a=>`<div class="p-3 bg-gray-50 rounded-lg text-sm font-medium text-gray-800">${a.title}</div>`).join(''):'<p class="text-center py-8 text-gray-400 text-sm font-medium">내역이 없습니다.</p>'}</div><button onclick="closeModal()" class="w-full py-3 bg-gray-100 font-bold text-gray-700 rounded-lg text-base">닫기</button>`; 
            showModal(); 
        }
        
        function showModal() { 
            const o = document.getElementById('modal-overlay'), c = document.getElementById('modal-container'); 
            o.classList.remove('hidden'); 
            setTimeout(() => { c.classList.remove('scale-95', 'opacity-0'); c.classList.add('scale-100', 'opacity-100'); }, 10); 
        }
        
        function closeModal() { 
            const c = document.getElementById('modal-container'); 
            c.classList.remove('scale-100', 'opacity-100'); c.classList.add('scale-95', 'opacity-0'); 
            setTimeout(() => { document.getElementById('modal-overlay').classList.add('hidden'); }, 200); 
        }
        
        window.onload = init;
    </script>
</body>
</html>
