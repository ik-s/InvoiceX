<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대금 수령 - InvoiceX</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");
        body { font-family: "Inter", sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-900">

    <!-- Nav -->
    <nav class="fixed top-0 left-0 w-full bg-white border-b border-gray-200 z-50">
        <div class="max-w-screen-xl mx-auto flex items-center justify-between px-4 sm:px-6 lg:px-8 h-16">
            <div class="flex items-center">
                <div class="text-blue-600 text-xl font-bold mr-3">InvoiceX</div>
                <!-- 인보이스 등록자 역할 배지 -->
                <span class="bg-blue-50 text-blue-700 text-xs font-bold py-1 px-2 rounded-md">인보이스 등록자</span>
                
                <div class="hidden sm:flex items-center ml-10 space-x-8 h-full">
                    <a href="register.html" class="text-gray-500 hover:text-gray-900 text-sm font-medium">인보이스 신규 등록</a>
                    <!-- 활성화 탭 -->
                    <a href="receive.html" class="text-blue-600 text-sm font-bold relative h-16 flex items-center border-b-2 border-blue-600">
                        대금 수령
                    </a>
                </div>
            </div>
            <div class="flex items-center space-x-2 bg-gray-50 border border-gray-200 rounded-full py-1 px-3">
                <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                <span class="text-gray-800 text-sm font-bold">Testnet</span>
                <span class="text-gray-500 text-sm ml-1">rN7d...x3Kq</span>
            </div>
        </div>
    </nav>

    <!-- Main -->
    <main class="max-w-screen-xl mx-auto pt-28 pb-16 px-4 sm:px-6 lg:px-8">

        <!-- Header -->
        <div class="mb-10 text-center flex flex-col items-center">
            <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 mb-2">대금 수령</h1>
            <p class="text-sm text-gray-500">만기가 도래하여 정산이 완료된 인보이스의 대금을 수령하세요.</p>
        </div>

        <!-- 수령 대기 목록 -->
        <div class="bg-white border border-gray-200 rounded-2xl overflow-hidden shadow-sm">
            <div class="px-6 py-5 border-b border-gray-100 flex justify-between items-center bg-white">
                <h2 class="text-sm font-bold text-gray-900">수령 가능 목록</h2>
                <!-- 대기 건수 배지 (JS 연동) -->
                <span id="pending-count-badge" class="bg-blue-50 text-blue-600 text-xs font-bold px-3 py-1 rounded-full">대기 중</span>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead class="bg-gray-50 border-b border-gray-100">
                        <tr>
                            <th class="py-4 px-6 font-medium text-gray-500">인보이스 ID</th>
                            <th class="py-4 px-6 font-medium text-gray-500">구매기업(지급기업)</th>
                            <th class="py-4 px-6 font-medium text-gray-500">원금액</th>
                            <th class="py-4 px-6 font-medium text-gray-500">실 수령 예정액</th>
                            <th class="py-4 px-6 font-medium text-gray-500">상태</th>
                            <th class="py-4 px-6 font-medium text-gray-500 text-right"></th>
                        </tr>
                    </thead>
                    <tbody id="receipt-list">
                        <!-- JS로 렌더링 됨 -->
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- 대금 수령 팝업(모달) -->
    <div id="modal-receipt" class="fixed inset-0 z-[100] hidden flex items-center justify-center px-4">
        <div class="absolute inset-0 bg-gray-900 bg-opacity-40 transition-opacity" onclick="closeModal('modal-receipt')"></div>
        
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md relative z-10 p-8 transform transition-all">
            <h2 class="text-xl font-bold text-gray-900 text-center mb-8">대금 수령</h2>
            
            <div class="bg-gray-50 border border-gray-100 rounded-xl p-5 mb-8 flex justify-between items-center">
                <span class="text-sm font-bold text-gray-900">rN7d...x3Kq (Main Treasury)</span>
                <span class="text-sm font-bold text-blue-600">120,500 RLUSD</span>
            </div>

            <div class="space-y-5 mb-8 px-1">
                <div class="flex justify-between items-center">
                    <span class="text-sm font-medium text-gray-500">인보이스 번호</span>
                    <span id="modal-inv-id" class="text-sm font-bold text-gray-900"></span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-sm font-medium text-gray-500">원금액</span>
                    <span id="modal-inv-amount" class="text-sm font-bold text-gray-900"></span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-sm font-medium text-gray-500">투자 대금 정산</span>
                    <span id="modal-inv-deduction" class="text-sm font-bold text-red-700"></span>
                </div>
            </div>

            <div class="border-t border-gray-100 pt-6 mb-8 px-1 flex justify-between items-center">
                <span class="text-base font-bold text-gray-900">최종 수령 금액</span>
                <span id="modal-inv-final" class="text-3xl font-bold text-blue-600"></span>
            </div>

            <button onclick="executeReceipt()" class="w-full py-4 bg-blue-600 text-white text-base font-bold rounded-xl hover:bg-blue-700 transition-colors shadow-sm">
                지금 RLUSD로 수령 및 정산
            </button>
        </div>
    </div>

    <!-- 수령 완료 안내 모달 -->
    <div id="modal-success" class="fixed inset-0 z-[110] hidden flex items-center justify-center px-4">
        <div class="absolute inset-0 bg-gray-900 bg-opacity-40 transition-opacity" onclick="closeAll()"></div>
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm relative z-10 p-6 text-center transform transition-all">
            <div class="w-14 h-14 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-7 h-7 text-blue-600" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h3 class="text-lg font-bold text-gray-900 mb-2">수령 완료</h3>
            <p class="text-xs text-gray-500 mb-6">지갑으로 <span id="success-amount" class="font-bold text-gray-900"></span> 상당의<br>RLUSD가 입금되었습니다.</p>
            <button onclick="closeAll()" class="w-full py-3 bg-gray-100 text-gray-800 text-sm font-bold rounded-lg hover:bg-gray-200 transition-colors">
                확인
            </button>
        </div>
    </div>

    <!-- JS 제어 -->
    <script>
        // 다양한 수령 대기/완료 더미 데이터
        const receipts = [
            { id: '#INV-2026-0042', corp: '삼성전자(주)', amount: '50,000,000', deduction: '- ₩43,000,000', finalAmount: '7,000,000', status: 'pending' },
            { id: '#INV-2026-0045', corp: '현대자동차(주)', amount: '120,000,000', deduction: '- ₩100,000,000', finalAmount: '20,000,000', status: 'pending' },
            { id: '#INV-2026-0048', corp: 'SK하이닉스(주)', amount: '85,000,000', deduction: '- ₩70,000,000', finalAmount: '15,000,000', status: 'pending' },
            { id: '#INV-2026-0031', corp: 'LG전자(주)', amount: '32,000,000', deduction: '- ₩27,000,000', finalAmount: '5,000,000', status: 'completed' },
            { id: '#INV-2026-0028', corp: '(주)한빛테크', amount: '15,000,000', deduction: '- ₩13,500,000', finalAmount: '1,500,000', status: 'completed' }
        ];

        let currentReceiptId = null;

        // 리스트 렌더링 함수
        function renderList() {
            const listBody = document.getElementById('receipt-list');
            listBody.innerHTML = '';
            
            let pendingCount = 0;

            receipts.forEach(item => {
                if (item.status === 'pending') {
                    pendingCount++;
                    // 대기 중 렌더링
                    listBody.innerHTML += `
                        <tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors bg-blue-50/30">
                            <td class="py-5 px-6 font-bold text-blue-600">${item.id}</td>
                            <td class="py-5 px-6 font-bold text-gray-900">${item.corp}</td>
                            <td class="py-5 px-6 text-gray-500">₩${item.amount}</td>
                            <td class="py-5 px-6 font-bold text-blue-600">₩${item.finalAmount}</td>
                            <td class="py-5 px-6">
                                <span class="bg-orange-50 text-orange-600 text-xs font-bold px-2 py-1 rounded-full border border-orange-100">수령 대기</span>
                            </td>
                            <td class="py-5 px-6 text-right">
                                <button onclick="prepareReceipt('${item.id}')" class="px-5 py-2.5 bg-blue-600 text-white text-xs font-bold rounded-lg hover:bg-blue-700 transition-colors shadow-sm">
                                    수령하기
                                </button>
                            </td>
                        </tr>
                    `;
                } else {
                    // 완료됨 렌더링
                    listBody.innerHTML += `
                        <tr class="border-b border-gray-100 text-gray-400">
                            <td class="py-5 px-6 font-medium">${item.id}</td>
                            <td class="py-5 px-6 font-medium">${item.corp}</td>
                            <td class="py-5 px-6">₩${item.amount}</td>
                            <td class="py-5 px-6">₩${item.finalAmount}</td>
                            <td class="py-5 px-6">
                                <span class="bg-gray-100 text-gray-500 text-xs font-bold px-2 py-1 rounded-full border border-gray-200">수령 완료</span>
                            </td>
                            <td class="py-5 px-6 text-right">
                                <button disabled class="px-5 py-2.5 bg-gray-100 text-gray-400 text-xs font-bold rounded-lg cursor-not-allowed">
                                    완료됨
                                </button>
                            </td>
                        </tr>
                    `;
                }
            });

            // 상단 대기 건수 뱃지 업데이트
            const badge = document.getElementById('pending-count-badge');
            if(pendingCount > 0) {
                badge.textContent = `${pendingCount}건 대기 중`;
                badge.className = "bg-blue-50 text-blue-600 text-xs font-bold px-3 py-1 rounded-full";
            } else {
                badge.textContent = `대기 건 없음`;
                badge.className = "bg-gray-100 text-gray-500 text-xs font-bold px-3 py-1 rounded-full";
            }
        }

        // 수령 모달 세팅 및 열기
        function prepareReceipt(id) {
            currentReceiptId = id;
            const item = receipts.find(r => r.id === id);
            
            // 모달 내 텍스트 동적 업데이트
            document.getElementById('modal-inv-id').textContent = item.id;
            document.getElementById('modal-inv-amount').textContent = `₩${item.amount}`;
            document.getElementById('modal-inv-deduction').textContent = item.deduction;
            document.getElementById('modal-inv-final').textContent = `₩${item.finalAmount}`;
            
            openModal('modal-receipt');
        }

        function executeReceipt() {
            closeModal('modal-receipt');
            
            // 배열 데이터 업데이트 (pending -> completed)
            const item = receipts.find(r => r.id === currentReceiptId);
            if (item) item.status = 'completed';

            // 성공 팝업 금액 세팅
            document.getElementById('success-amount').textContent = `₩${item.finalAmount}`;
            
            setTimeout(() => {
                openModal('modal-success');
            }, 200);
        }

        function closeAll() {
            closeModal('modal-success');
            renderList(); // 데이터 상태가 변경되었으므로 리스트 리렌더링
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // 초기 실행
        window.onload = renderList;
    </script>
</body>
</html>
