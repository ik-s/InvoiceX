<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인보이스 등록 - InvoiceX</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");
        body { font-family: "Inter", sans-serif; }
        
        .upload-area.dragover { border-color: #3b82f6; background-color: #eff6ff; }
        
        /* 스크롤바 숨기기 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-900">

    <!-- Nav -->
    <nav class="fixed top-0 left-0 w-full bg-white border-b border-gray-200 z-50">
        <div class="max-w-screen-xl mx-auto flex items-center justify-between px-4 sm:px-6 lg:px-8 h-16">
            <div class="flex items-center">
                <div class="text-blue-600 text-xl font-bold mr-3">InvoiceX</div>
                <span class="bg-blue-50 text-blue-700 text-xs font-bold py-1 px-2 rounded-md">인보이스 등록자</span>
                
                <div class="hidden sm:flex items-center ml-10 space-x-8 h-full">
                    <a href="register.html" class="text-blue-600 text-sm font-bold relative h-16 flex items-center border-b-2 border-blue-600">
                        인보이스 신규 등록
                    </a>
                    <a href="receive.html" class="text-gray-500 hover:text-gray-900 text-sm font-medium">대금 수령</a>
                </div>
            </div>
            <div class="flex items-center space-x-2 bg-gray-50 border border-gray-200 rounded-full py-1 px-3">
                <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                <span class="text-gray-800 text-sm font-bold">Testnet</span>
                <span class="text-gray-500 text-sm ml-1">rN7d...x3Kq</span>
            </div>
        </div>
    </nav>

    <!-- Main -->
    <main class="max-w-screen-xl mx-auto pt-28 pb-16 px-4 sm:px-6 lg:px-8">

        <!-- Header -->
        <div class="mb-10 text-center flex flex-col items-center">
            <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 mb-2">인보이스 등록</h1>
            <p class="text-sm text-gray-500">납품 또는 용역 제공이 완료된 인보이스를 등록하세요.</p>
        </div>

        <!-- 폼 컨테이너 -->
        <div class="max-w-3xl mx-auto bg-white border border-gray-200 rounded-2xl p-6 sm:p-10 shadow-sm">
            
            <form onsubmit="handleFormSubmit(event)">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <!-- 구매기업명 (자동완성 적용) -->
                    <div class="relative">
                        <label class="block text-xs font-bold text-gray-700 mb-2">구매기업명 (지급기업)</label>
                        <input type="text" id="buyer-name" autocomplete="off" oninput="showSuggestions(this.value)" placeholder="예: 삼성전자(주)" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                        
                        <!-- 추천 검색어 박스 -->
                        <ul id="suggestion-box" class="absolute z-10 w-full bg-white border border-gray-200 rounded-lg shadow-lg mt-1 hidden max-h-40 overflow-y-auto no-scrollbar"></ul>
                    </div>
                    
                    <!-- 담당자 이메일 -->
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-2">구매기업 담당자 이메일</label>
                        <input type="email" placeholder="buyer@company.com" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                    </div>

                    <!-- 인보이스 금액 -->
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-2">인보이스 금액</label>
                        <input type="text" placeholder="50,000,000 원" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                    </div>

                    <!-- 통화 -->
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-2">통화</label>
                        <input type="text" value="KRW (원)" readonly class="w-full px-4 py-3 bg-gray-100 border border-gray-200 rounded-lg text-sm text-gray-500 cursor-not-allowed">
                    </div>

                    <!-- 만기일 -->
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-2">만기일 (대금 지급 예정일)</label>
                        <input type="date" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg text-sm text-gray-500 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                    </div>

                    <!-- 납품 완료일 -->
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-2">납품 완료일</label>
                        <input type="date" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg text-sm text-gray-500 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                    </div>
                </div>

                <!-- 인보이스 설명 -->
                <div class="mb-6">
                    <label class="block text-xs font-bold text-gray-700 mb-2">인보이스 설명</label>
                    <textarea rows="3" placeholder="납품 내역, 계약 번호 등을 입력하세요" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 transition-colors resize-none"></textarea>
                </div>

                <!-- 첨부파일 (실제 파일 업로드) -->
                <div class="mb-10">
                    <label class="block text-xs font-bold text-gray-700 mb-2">첨부파일 <span class="text-red-500">*</span></label>
                    
                    <!-- 드래그 & 클릭 영역 -->
                    <div id="drop-zone" onclick="document.getElementById('file-upload').click()" class="upload-area border-2 border-dashed border-gray-300 rounded-xl p-8 text-center cursor-pointer hover:border-blue-500 hover:bg-blue-50 transition-all bg-gray-50 relative">
                        
                        <!-- 실제 보이지 않는 파일 인풋 -->
                        <input type="file" id="file-upload" class="hidden" accept=".pdf,.jpg,.jpeg,.png" onchange="handleFileSelect(this)">
                        
                        <!-- 업로드 전 보여지는 UI -->
                        <div id="upload-placeholder">
                            <svg class="mx-auto h-10 w-10 text-gray-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                            </svg>
                            <p class="text-sm font-bold text-gray-700">클릭하거나 파일을 이곳으로 드래그 하세요.</p>
                            <p class="text-xs text-gray-500 mt-1">전자세금계산서, 거래명세서 (PDF, JPG, PNG)</p>
                        </div>

                        <!-- 업로드 후 보여지는 UI (숨김 상태) -->
                        <div id="file-preview" class="hidden flex items-center justify-between bg-white border border-blue-200 p-4 rounded-lg shadow-sm max-w-md mx-auto" onclick="event.stopPropagation()">
                            <div class="flex items-center gap-3 truncate">
                                <span class="text-xl">📄</span>
                                <span id="file-name" class="text-sm font-bold text-blue-700 truncate">filename.pdf</span>
                            </div>
                            <button type="button" onclick="removeFile(event)" class="text-xs font-bold text-red-500 hover:text-red-700 px-3 py-1.5 bg-red-50 rounded-lg transition-colors flex-shrink-0">
                                삭제
                            </button>
                        </div>

                    </div>
                </div>

                <!-- 하단 버튼 영역 -->
                <div class="flex justify-end gap-3 pt-6 border-t border-gray-100">
                    <button type="button" class="px-6 py-3.5 bg-gray-100 text-gray-700 text-sm font-bold rounded-lg hover:bg-gray-200 transition-colors">
                        임시 저장
                    </button>
                    <button type="submit" class="px-8 py-3.5 bg-blue-600 text-white text-sm font-bold rounded-lg hover:bg-blue-700 transition-colors shadow-sm flex items-center gap-2">
                        인보이스 등록 요청
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </button>
                </div>
            </form>

        </div>
    </main>

    <!-- 에러 모달 (파일 미첨부 시) -->
    <div id="modal-error" class="fixed inset-0 z-[100] hidden flex items-center justify-center px-4">
        <div class="absolute inset-0 bg-gray-900 bg-opacity-40 transition-opacity" onclick="closeModal('modal-error')"></div>
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm relative z-10 p-6 text-center transform transition-all">
            <div class="w-14 h-14 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-7 h-7 text-red-500" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            </div>
            <h3 class="text-lg font-bold text-gray-900 mb-2">첨부파일 누락</h3>
            <p class="text-xs text-gray-500 mb-6">전자세금계산서 또는 거래명세서<br>파일을 반드시 업로드해야 합니다.</p>
            <button onclick="closeModal('modal-error')" class="w-full py-3 bg-gray-100 text-gray-800 text-sm font-bold rounded-lg hover:bg-gray-200 transition-colors">
                확인
            </button>
        </div>
    </div>

    <!-- 등록 완료 모달 -->
    <div id="modal-success" class="fixed inset-0 z-[100] hidden flex items-center justify-center px-4">
        <div class="absolute inset-0 bg-gray-900 bg-opacity-40 transition-opacity" onclick="closeModal('modal-success')"></div>
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm relative z-10 p-6 text-center transform transition-all">
            <div class="w-14 h-14 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-7 h-7 text-blue-600" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h3 class="text-lg font-bold text-gray-900 mb-2">인보이스 등록 완료</h3>
            <p class="text-xs text-gray-500 mb-6">구매 기업으로 인보이스 검토 요청이<br>성공적으로 전송되었습니다.</p>
            <button onclick="closeModal('modal-success')" class="w-full py-3 bg-gray-100 text-gray-800 text-sm font-bold rounded-lg hover:bg-gray-200 transition-colors">
                확인
            </button>
        </div>
    </div>

    <!-- JS 스크립트 -->
    <script>
        // 1. 모달 제어
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // 2. 구매기업 DB 가상 데이터 및 자동완성
        const dbCompanies = ['삼성전자(주)', 'LG전자(주)', '(주)한빛테크', '(주)스마트솔루션', '(주)그린파츠', '현대자동차(주)', 'SK하이닉스(주)'];

        function showSuggestions(val) {
            const box = document.getElementById('suggestion-box');
            box.innerHTML = '';
            
            if(!val) { 
                box.classList.add('hidden'); 
                return; 
            }
            
            // 입력값 포함하는 기업명 필터링
            const matches = dbCompanies.filter(c => c.toLowerCase().includes(val.toLowerCase()));
            
            if(matches.length === 0) { 
                box.classList.add('hidden'); 
                return; 
            }
            
            box.classList.remove('hidden');
            matches.forEach(match => {
                const li = document.createElement('li');
                li.className = 'px-4 py-3 hover:bg-blue-50 cursor-pointer text-sm font-medium text-gray-700 transition-colors border-b border-gray-50 last:border-0';
                li.textContent = match;
                li.onclick = () => {
                    document.getElementById('buyer-name').value = match;
                    box.classList.add('hidden');
                };
                box.appendChild(li);
            });
        }

        // 입력창 바깥 클릭 시 추천 상자 닫기
        document.addEventListener('click', (e) => {
            if(!e.target.closest('#buyer-name') && !e.target.closest('#suggestion-box')) {
                document.getElementById('suggestion-box').classList.add('hidden');
            }
        });

        // 3. 파일 업로드 및 삭제 제어
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-upload');
        const uploadPlaceholder = document.getElementById('upload-placeholder');
        const filePreview = document.getElementById('file-preview');
        const fileNameDisp = document.getElementById('file-name');

        // 드래그 앤 드롭 이벤트
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if(e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                handleFileSelect(fileInput);
            }
        });

        // 파일 선택 시 UI 변경
        function handleFileSelect(input) {
            if(input.files && input.files[0]) {
                const file = input.files[0];
                fileNameDisp.textContent = file.name;
                
                uploadPlaceholder.classList.add('hidden');
                filePreview.classList.remove('hidden');
            }
        }

        // 파일 삭제
        function removeFile(e) {
            e.stopPropagation(); // 클릭 이벤트가 drop-zone으로 전파되는 것 방지
            fileInput.value = ""; // input 초기화
            
            filePreview.classList.add('hidden');
            uploadPlaceholder.classList.remove('hidden');
        }

        // 4. 폼 제출 검증 (파일 필수 체크)
        function handleFormSubmit(e) {
            e.preventDefault();
            
            if(fileInput.files.length === 0) {
                openModal('modal-error'); // 파일 없으면 에러 팝업
            } else {
                openModal('modal-success'); // 정상 등록 팝업
            }
        }
    </script>
</body>
</html>
