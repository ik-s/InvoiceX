<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>역할 선택 - InvoiceX</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<style>
  body { font-family: "Pretendard", sans-serif; -webkit-font-smoothing: antialiased; letter-spacing: -0.02em; }
  .role-card { transition: all .25s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: 2px solid transparent; }
  .role-card:hover { transform: translateY(-6px); box-shadow: 0 20px 40px rgba(37,99,235,0.08); border-color: #2563eb; }
  
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px) } to { opacity: 1; transform: translateY(0) } }
  .fade-up { animation: fadeUp 0.5s ease forwards; opacity: 0; }
  .delay-1 { animation-delay: 0.1s; }
  .delay-2 { animation-delay: 0.2s; }
  .delay-3 { animation-delay: 0.3s; }
</style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col justify-center items-center p-6">

  <div class="max-w-4xl w-full">
    <div class="text-center mb-16 fade-up">
      <h1 class="text-blue-600 text-4xl font-extrabold mb-4 tracking-tighter">InvoiceX</h1>
      <p class="text-gray-500 font-bold text-lg">진행하실 역할을 선택해 주세요.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <div onclick="location.href='mypage.html?role=funder'" class="role-card bg-white rounded-3xl p-8 shadow-sm fade-up delay-1">
        <div class="w-14 h-14 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mb-6">
          <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 011-18 0z"/></svg>
        </div>
        <h3 class="text-xl font-bold mb-3">자금공급자</h3>
        <p class="text-gray-400 text-sm leading-relaxed font-medium">매출채권에 투자하여 수익을 창출하고 자산을 관리합니다.</p>
      </div>

      <div onclick="location.href='mypage.html?role=registrar'" class="role-card bg-white rounded-3xl p-8 shadow-sm fade-up delay-2">
        <div class="w-14 h-14 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mb-6">
          <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        </div>
        <h3 class="text-xl font-bold mb-3">인보이스 등록자</h3>
        <p class="text-gray-400 text-sm leading-relaxed font-medium">채권을 등록하고 조기 현금화를 통해 유동성을 확보합니다.</p>
      </div>

      <div onclick="location.href='mypage.html?role=payer'" class="role-card bg-white rounded-3xl p-8 shadow-sm fade-up delay-3">
        <div class="w-14 h-14 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mb-6">
          <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
        </div>
        <h3 class="text-xl font-bold mb-3">대금지급기업</h3>
        <p class="text-gray-400 text-sm leading-relaxed font-medium">매입 채무를 확인하고 투명하게 대금을 정산합니다.</p>
      </div>
    </div>

    <div class="mt-16 text-center fade-up delay-3">
        <p class="text-xs font-bold text-gray-300 uppercase tracking-widest mb-4">Demo Testing Option</p>
        <div class="flex justify-center gap-4">
            <button onclick="location.href='mypage.html?kyb=false'" class="text-xs font-bold text-gray-400 hover:text-red-400 transition">KYB 미인증 화면 테스트 ↗</button>
        </div>
    </div>
  </div>

  <footer class="mt-20 text-gray-300 text-xs font-bold">
    &copy; 2026 InvoiceX Corp. All rights reserved.
  </footer>

</body>
</html>
