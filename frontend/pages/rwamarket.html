<!DOCTYPE html>
<html lang="ko">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>RWA 마켓 — InvoiceX</title>
        <link rel="stylesheet" as="style" crossorigin
            href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            body {
                font-family: "Pretendard", sans-serif;
                font-weight: 300;
                -webkit-font-smoothing: antialiased;
                letter-spacing: -0.02em;
                background-color: #f8fafc;
            }

            .fw-bold {
                font-weight: 600 !important;
            }

            .saas-card {
                background: #fff;
                border: 1px solid #e2e8f0;
                border-radius: 16px;
                box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
            }

            .modal-panel {
                transform: scale(.97);
                opacity: 0;
                transition: all .22s ease;
            }

            .modal-panel.show {
                transform: scale(1);
                opacity: 1;
            }

            .modal-text-wrap {
                overflow-wrap: anywhere;
                word-break: keep-all;
                line-height: 1.55;
            }

            .market-card {
                transition: all .2s cubic-bezier(.4, 0, .2, 1);
            }

            .market-card:hover {
                transform: translateY(-2px);
                border-color: #bfdbfe;
                box-shadow: 0 10px 15px -3px rgba(59, 130, 246, .06);
            }
        </style>
    </head>

    <body class="text-gray-900 min-w-0">

        <nav class="fixed top-0 left-0 w-full bg-white border-b border-gray-100 z-50 h-14 flex items-center">
            <div class="max-w-7xl mx-auto w-full flex items-center justify-between px-6">
                <div class="flex items-center space-x-10 min-w-0">
                    <a href="mypage.html?role=funder"
                        class="text-blue-600 text-xl fw-bold cursor-pointer flex-shrink-0">InvoiceX</a>
                    <div class="hidden md:flex space-x-8 text-sm text-gray-400">
                        <a href="mypage.html?role=funder" class="hover:text-blue-600 transition">마이페이지</a>
                        <a href="rwamarket.html" class="text-blue-600 fw-bold border-b-2 border-blue-600 pb-0.5">RWA
                            마켓</a>
                    </div>
                </div>
                <button onclick="InvoiceXApi.logout(); location.href='login.html'"
                    class="text-xs text-gray-400 hover:text-red-500 transition flex items-center gap-1.5">
                    로그아웃
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                </button>
            </div>
        </nav>

        <main class="pt-20 pb-16 max-w-7xl mx-auto px-6">
            <div class="mb-6">
                <a href="mypage.html?role=funder"
                    class="inline-flex items-center gap-2 text-sm text-gray-400 hover:text-blue-600 transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                    </svg>
                    마이페이지로 돌아가기
                </a>
            </div>

            <section class="saas-card p-8 mb-8 flex flex-col lg:flex-row lg:items-end lg:justify-between gap-6">
                <div>
                    <p class="text-xs text-blue-600 fw-bold mb-3 uppercase tracking-widest">RWA Market</p>
                    <h1 class="text-2xl fw-bold text-gray-900 mb-2">검증된 인보이스 RWA에 참여하세요</h1>
                    <p class="text-sm text-gray-400 leading-relaxed">리스크 패스포트와 RWA 정보를 확인한 뒤, 보유 RLUSD 한도 내에서 참여할 수
                        있습니다.</p>
                </div>
                <div class="grid grid-cols-2 gap-3 w-full lg:w-auto">
                    <div class="bg-gray-50 border border-gray-100 rounded-2xl px-5 py-4">
                        <p class="text-xs text-gray-400 mb-1">출금 가능 잔액</p>
                        <p class="text-lg fw-bold text-gray-900"><span id="market-wallet-balance">-</span> <span class="text-xs text-gray-400">Testnet XRP</span>
                        </p>
                    </div>
                    <div class="bg-blue-50 border border-blue-100 rounded-2xl px-5 py-4">
                        <p class="text-xs text-blue-500 mb-1">참여 가능 자산</p>
                        <p id="available-count" class="text-lg fw-bold text-blue-600">3 <span
                                class="text-xs text-blue-400">건</span></p>
                    </div>
                </div>
            </section>

            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-6">
                <div class="relative w-full sm:max-w-md">
                    <svg class="absolute left-4 top-1/2 transform -translate-y-1/2 w-4 h-4 text-gray-300" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-4.35-4.35M11 18a7 7 0 100-14 7 7 0 000 14z" />
                    </svg>
                    <input id="market-search" oninput="setMarketSearch(this.value)" type="text"
                        placeholder="기업명, 인보이스 ID, Risk Grade 검색"
                        class="w-full h-10 pl-11 pr-4 rounded-xl bg-white border border-gray-200 text-sm text-gray-700 placeholder-gray-300 focus:outline-none focus:border-blue-300 focus:ring-2 focus:ring-blue-50 transition">
                </div>
                <div class="flex items-center space-x-2 text-sm text-gray-400">
                    <span>정렬</span>
                    <select id="market-sort" onchange="setMarketSort(this.value)"
                        class="border border-gray-200 rounded-xl h-10 px-3 bg-white text-gray-600 text-sm focus:outline-none focus:border-blue-300 focus:ring-2 focus:ring-blue-50 transition cursor-pointer">
                        <option value="latest">최신순</option>
                        <option value="grade">등급 높은순</option>
                        <option value="due">만기일 빠른순</option>
                        <option value="amount">금액 높은순</option>
                    </select>
                </div>
            </div>

            <div id="market-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
        </main>

        <div id="modal-overlay"
            class="fixed inset-0 bg-black bg-opacity-40 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-sm"
            onclick="closeModal()">
            <div id="modal-container"
                class="modal-panel bg-white w-full max-w-3xl rounded-2xl p-8 shadow-2xl max-h-[88vh] overflow-y-auto"
                onclick="event.stopPropagation()"></div>
        </div>

        <script src="../assets/js/api.js"></script>
        <script>
            const WALLET_STORAGE_KEY = 'invoiceXWallet';
            const RWA_TREASURY_STORAGE_KEY = 'ix_demo_rwa_treasury_wallet';
            let marketSearch = '';
            let marketSort = 'latest';
            let processingId = null;

            function getStoredWallet() {
                if (!InvoiceXApi.walletSessionActive()) return null;

                try {
                    return JSON.parse(localStorage.getItem(WALLET_STORAGE_KEY) || 'null');
                } catch (_error) {
                    return null;
                }
            }

            function saveStoredWallet(wallet) {
                localStorage.setItem(WALLET_STORAGE_KEY, JSON.stringify(wallet));
                InvoiceXApi.markWalletSession();
            }

            function isTestnetWallet(wallet) {
                return wallet?.walletType === 'xrpl-testnet' && wallet.seed && wallet.address;
            }

            function formatXrp(value) {
                return Number(value || 0).toLocaleString('ko-KR', { maximumFractionDigits: 6 });
            }

            function testnetJoinAmount(item) {
                return Math.max(0.1, Math.min(5, item.amountRLUSD / 10000)).toFixed(3);
            }

            async function ensureRwaTreasuryWallet() {
                try {
                    const saved = JSON.parse(localStorage.getItem(RWA_TREASURY_STORAGE_KEY) || 'null');
                    if (saved?.address) return saved;
                } catch (_error) {
                    // Ignore broken demo cache and recreate the treasury wallet below.
                }

                const result = await InvoiceXApi.createTestnetWallet({ amount_xrp: '20' });
                const wallet = {
                    address: result.wallet.address,
                    seed: result.wallet.seed,
                    network: result.wallet.network,
                    xrpBalance: Number(result.balance_xrp || result.wallet.balance_xrp || 0)
                };
                localStorage.setItem(RWA_TREASURY_STORAGE_KEY, JSON.stringify(wallet));
                return wallet;
            }

            async function refreshWalletBalance(wallet) {
                if (!isTestnetWallet(wallet)) return wallet;
                const result = await InvoiceXApi.testnetBalance(wallet.address);
                wallet.xrpBalance = Number(result.balance_xrp || 0);
                saveStoredWallet(wallet);
                renderMarketWalletBalance();
                return wallet;
            }

            function renderMarketWalletBalance() {
                const el = document.getElementById('market-wallet-balance');
                const wallet = getStoredWallet();
                if (!el) return;
                el.textContent = isTestnetWallet(wallet) ? formatXrp(wallet.xrpBalance) : '지갑 필요';
            }

            const rwaItems = [
                {
                    id: 'INV-2026-0101', grade: 'A', gradeClass: 'bg-blue-50 text-blue-600 border-blue-100', confirmable: true,
                    issuer: '(주)한빛테크', buyer: '삼성전자(주)', amountKRW: '₩60,475,200', amountRLUSD: 45320,
                    due: '2026.07.15', dday: 'D-64', yieldText: '6.8%', status: '참여 가능',
                    info: { supply: '전자부품 납품 매출채권', issuedAt: '2026.05.12', maturity: '2026.07.15', unitPrincipal: '₩10,000 / RWA', token: 'RLUSD', settlement: 'XRPL Escrow' },
                    passport: { paymentCheck: '확인 완료', dispute: '분쟁 없음', paymentHistory: '정상 지급 12건', delay: '지연 이력 없음', verification: '인보이스/납품/지급 확인 완료', expected: '₩60,475,200' }
                },
                {
                    id: 'INV-2026-0102', grade: 'A', gradeClass: 'bg-blue-50 text-blue-600 border-blue-100', confirmable: true,
                    issuer: '대한건설(주)', buyer: '현대자동차(주)', amountKRW: '₩42,800,000', amountRLUSD: 32100,
                    due: '2026.06.28', dday: 'D-47', yieldText: '6.2%', status: '참여 가능',
                    info: { supply: '공급망 대금 매출채권', issuedAt: '2026.05.10', maturity: '2026.06.28', unitPrincipal: '₩10,000 / RWA', token: 'RLUSD', settlement: 'XRPL Escrow' },
                    passport: { paymentCheck: '확인 완료', dispute: '분쟁 없음', paymentHistory: '정상 지급 9건', delay: '지연 이력 없음', verification: '인보이스/계약/납품 확인 완료', expected: '₩42,800,000' }
                },
                {
                    id: 'INV-2026-0103', grade: 'B', gradeClass: 'bg-gray-50 text-gray-600 border-gray-100', confirmable: false,
                    issuer: '에이스무역', buyer: 'LG디스플레이(주)', amountKRW: '₩35,000,000', amountRLUSD: 26250,
                    due: '2026.08.01', dday: 'D-81', yieldText: '7.4%', status: '참여 가능',
                    info: { supply: '해외 부품 공급 매출채권', issuedAt: '2026.05.08', maturity: '2026.08.01', unitPrincipal: '₩10,000 / RWA', token: 'RLUSD', settlement: 'XRPL Escrow' },
                    passport: { paymentCheck: '확인 완료', dispute: '분쟁 없음', paymentHistory: '정상 지급 5건', delay: '소액 지연 1건', verification: '인보이스/계약 확인 완료', expected: '₩35,000,000' }
                }
            ];

            function setMarketSearch(value) {
                marketSearch = value.trim().toLowerCase();
                renderMarket();
            }

            function setMarketSort(value) {
                marketSort = value;
                renderMarket();
            }

            function marketSearchText(item) {
                return [
                    item.id, item.grade, 'Risk Grade ' + item.grade, item.issuer, item.buyer,
                    item.amountKRW, item.amountRLUSD, item.due, item.dday, item.status,
                    item.info.supply, item.info.settlement
                ].join(' ').toLowerCase();
            }

            function sortMarketRows(rows) {
                const gradeRank = { A: 1, B: 2, C: 3, D: 4 };
                const sorted = [...rows];
                if (marketSort === 'grade') {
                    sorted.sort((a, b) => (gradeRank[a.grade] || 99) - (gradeRank[b.grade] || 99));
                } else if (marketSort === 'due') {
                    sorted.sort((a, b) => new Date(a.due) - new Date(b.due));
                } else if (marketSort === 'amount') {
                    sorted.sort((a, b) => b.amountRLUSD - a.amountRLUSD);
                } else {
                    sorted.sort((a, b) => b.id.localeCompare(a.id));
                }
                return sorted;
            }


            function updateMarketSummary() {
                const available = rwaItems.filter(item => item.status === '참여 가능').length;
                const el = document.getElementById('available-count');
                if (el) el.innerHTML = available + ' <span class="text-xs text-blue-400">건</span>';
            }

            function gradeBadge(item) {
                return `<span class="text-xs fw-bold py-1 px-2.5 rounded-full border ${item.gradeClass}">Risk Grade ${item.grade}</span>`;
            }

            function renderMarket() {
                updateMarketSummary();
                const grid = document.getElementById('market-grid');
                const rows = sortMarketRows(rwaItems.filter(item => !marketSearch || marketSearchText(item).includes(marketSearch)));
                grid.innerHTML = rows.map(item => {
                    const done = item.status === '참여 완료';
                    return `
                <div class="market-card saas-card p-6">
                    <div class="flex items-center justify-between mb-5 gap-3">
                        ${gradeBadge(item)}
                        <span class="text-xs text-gray-400">#${item.id}</span>
                    </div>
                    <p class="text-sm text-gray-500 mb-1 modal-text-wrap">${item.issuer} → ${item.buyer}</p>
                    <p class="text-2xl fw-bold text-gray-900 mt-2 mb-4 tracking-tight">${item.amountKRW}</p>
                    <div class="h-px bg-gray-100 mb-4"></div>
                    <div class="grid grid-cols-2 gap-3 text-sm mb-5">
                        <div class="bg-gray-50 rounded-xl p-3 border border-gray-100">
                            <p class="text-xs text-gray-400 mb-1">예상 수익률</p>
                            <p class="fw-bold text-blue-600">${item.yieldText}</p>
                        </div>
                        <div class="bg-gray-50 rounded-xl p-3 border border-gray-100">
                            <p class="text-xs text-gray-400 mb-1">만기</p>
                            <p class="fw-bold text-gray-700">${item.dday}</p>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-2 mb-3">
                        <button onclick="openRWAModal('${item.id}')" class="flex-1 min-w-[110px] h-9 rounded-xl bg-gray-100 text-gray-600 text-xs fw-bold hover:bg-gray-200 transition">RWA 정보</button>
                        <button onclick="openPassportModal('${item.id}')" class="flex-1 min-w-[110px] h-9 rounded-xl bg-blue-50 text-blue-600 text-xs fw-bold hover:bg-blue-100 transition">risk passport</button>
                    </div>
                    <button onclick="openJoinModal('${item.id}')" ${done ? 'disabled' : ''} class="w-full h-10 rounded-xl text-sm fw-bold transition ${done ? 'bg-gray-100 text-gray-400 cursor-default' : 'bg-blue-600 hover:bg-blue-700 text-white shadow-sm'}">
                        ${done ? '참여 완료' : '참여하기'}
                    </button>
                </div>`;
                }).join('') || `<div class="col-span-full saas-card p-12 text-center text-sm text-gray-400">검색 결과가 없습니다.</div>`;
            }

            function getItem(id) { return rwaItems.find(item => item.id === id); }

            function openRWAModal(id) {
                const item = getItem(id);
                const i = item.info;
                setModal(`
                <div class="flex items-start justify-between gap-4 mb-6">
                    <div>
                        <p class="text-xs text-blue-600 fw-bold mb-2 uppercase tracking-widest">RWA Information</p>
                        <h3 class="text-lg fw-bold text-gray-900">RWA 정보</h3>
                        <p class="text-sm text-gray-400 mt-1 modal-text-wrap">${item.issuer} → ${item.buyer}</p>
                    </div>
                    ${gradeBadge(item)}
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-6">
                    ${infoRow('인보이스 ID', '#' + item.id)}
                    ${infoRow('기초 자산', i.supply)}
                    ${infoRow('발행 기업', item.issuer)}
                    ${infoRow('바이어 기업', item.buyer)}
                    ${infoRow('모집 금액', item.amountKRW)}
                    ${infoRow('참여 금액', item.amountRLUSD.toLocaleString() + ' RLUSD')}
                    ${infoRow('원금액(개당)', i.unitPrincipal)}
                    ${infoRow('수익률', item.yieldText)}
                    ${infoRow('발행일', i.issuedAt)}
                    ${infoRow('만기일', i.maturity)}
                    
                </div>
                <button onclick="closeModal()" class="w-full h-10 rounded-xl bg-gray-100 text-gray-700 text-sm fw-bold hover:bg-gray-200 transition">닫기</button>
            `);
            }

            function openPassportModal(id) {
                const item = getItem(id);
                const p = item.passport;
                setModal(`
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-6">
                    <h3 class="text-lg fw-bold text-gray-900">Risk Passport</h3>
                    <div class="flex items-center gap-2">
                        ${gradeBadge(item)}
                      
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-6">
                    ${passportCard('지급 확인 여부', p.paymentCheck, '지급기업이 해당 인보이스의 지급 예정 사실을 확인했는지 여부')}
                    ${passportCard('분쟁 여부', p.dispute, '납품, 계약, 대금 지급과 관련된 분쟁 발생 여부')}
                    ${passportCard('과거 지급 이력', p.paymentHistory, '지급기업 또는 발행기업의 이전 지급 및 상환 이력')}
                    ${passportCard('지급 지연 이력', p.delay, '과거 거래에서 대금 지급이 지연된 이력이 있는지 여부')}
                    ${passportCard('검증 상태', p.verification, '인보이스, 계약, 납품, 지급 확인 등의 검증 진행 상태')}
                    ${passportCard('예상 수령액', p.expected, '자금 공급자가 받는 총액과 원금을 더한 값')}
                </div>
                <div class="bg-blue-50 border border-blue-100 rounded-2xl p-5 mb-6">
                    <p class="text-sm fw-bold text-blue-700 mb-1">요약 판단</p>
                    <p class="text-sm text-blue-500 modal-text-wrap">지급 확인, 분쟁 여부, 과거 지급 이력, 지연 이력, 검증 상태를 기준으로 산정한 risk passport입니다. 최종 참여 전 RWA 정보와 함께 확인하세요.</p>
                </div>
                <button onclick="closeModal()" class="w-full h-10 rounded-xl bg-gray-100 text-gray-700 text-sm fw-bold hover:bg-gray-200 transition">닫기</button>
            `);
            }

            function openJoinModal(id) {
                const item = getItem(id);
                const wallet = getStoredWallet();
                const hasWallet = isTestnetWallet(wallet);
                const balance = hasWallet ? Number(wallet.xrpBalance || 0) : 0;
                const amountXrp = Number(testnetJoinAmount(item));
                const after = balance - amountXrp;
                setModal(`
                <h3 class="text-lg fw-bold text-gray-900 mb-2">RWA 참여 확인</h3>
                <p class="text-sm text-gray-400 mb-6 modal-text-wrap">XRPL Testnet XRP로 참여 트랜잭션을 전송합니다. 성공하면 참여 완료 상태로 변경됩니다.</p>
                <div class="bg-gray-50 border border-gray-100 rounded-2xl p-5 mb-4">
                    <div class="flex justify-between py-2 border-b border-gray-200"><span class="text-sm text-gray-400">참여 자산</span><span class="text-sm fw-bold text-gray-900">#${item.id}</span></div>
                    <div class="flex justify-between py-2 border-b border-gray-200"><span class="text-sm text-gray-400">발행/바이어</span><span class="text-sm fw-bold text-gray-900 text-right modal-text-wrap">${item.issuer} → ${item.buyer}</span></div>
                    <div class="flex justify-between py-2 border-b border-gray-200"><span class="text-sm text-gray-400">원래 참여 금액</span><span class="text-sm fw-bold text-gray-900">${item.amountRLUSD.toLocaleString()} RLUSD</span></div>
                    <div class="flex justify-between py-2 border-b border-gray-200"><span class="text-sm text-gray-400">Testnet 전송 금액</span><span class="text-sm fw-bold text-blue-600">${formatXrp(amountXrp)} XRP</span></div>
                    <div class="flex justify-between py-2 border-b border-gray-200"><span class="text-sm text-gray-400">출금 가능 잔액</span><span class="text-sm fw-bold text-gray-900">${hasWallet ? formatXrp(balance) + ' XRP' : 'XRPL Testnet 지갑 필요'}</span></div>
                    <div class="flex justify-between py-2"><span class="text-sm text-gray-400">참여 후 잔액</span><span class="text-sm fw-bold ${after < 0 ? 'text-red-500' : 'text-gray-900'}">${hasWallet ? formatXrp(after) + ' XRP' : '-'}</span></div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-6">
                    <div class="bg-gray-50 border border-gray-100 rounded-2xl p-4">
                        <p class="text-xs text-gray-400 mb-1">참여 후 상태</p>
                        <p class="text-sm fw-bold text-gray-900">포트폴리오 반영</p>
                    </div>
                    <div class="bg-gray-50 border border-gray-100 rounded-2xl p-4">
                        <p class="text-xs text-gray-400 mb-1">정산 방식</p>
                        <p class="text-sm fw-bold text-gray-900">XRPL Escrow</p>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button onclick="closeModal()" class="flex-1 h-10 rounded-xl bg-gray-100 text-gray-500 text-sm fw-bold hover:bg-gray-200 transition">취소</button>
                    <button id="join-execute-btn" onclick="executeJoin('${item.id}')" ${!hasWallet || after < 0 ? 'disabled' : ''} class="flex-1 h-10 rounded-xl ${!hasWallet || after < 0 ? 'bg-gray-100 text-gray-300 cursor-default' : 'bg-blue-600 hover:bg-blue-700 text-white'} text-sm fw-bold transition">참여 실행</button>
                </div>
            `);
            }

            async function executeJoin(id) {
                if (processingId) return;
                let wallet = getStoredWallet();
                if (!isTestnetWallet(wallet)) {
                    alert('마이페이지에서 XRPL Testnet Faucet 지갑을 먼저 생성해주세요.');
                    return;
                }

                processingId = id;
                const btn = document.getElementById('join-execute-btn');
                if (btn) { btn.disabled = true; btn.textContent = '처리 중...'; btn.className = 'flex-1 h-10 rounded-xl bg-gray-100 text-gray-400 text-sm fw-bold cursor-default'; }
                try {
                    const item = getItem(id);
                    const destination = await ensureRwaTreasuryWallet();
                    const payment = await InvoiceXApi.sendTestnetPayment({
                        source_seed: wallet.seed,
                        destination_address: destination.address,
                        amount_xrp: testnetJoinAmount(item),
                        memo: `InvoiceX RWA participation ${item.id}`
                    });
                    wallet = await refreshWalletBalance(wallet);
                    item.status = '참여 완료';
                    item.txHash = payment.tx_hash;
                    processingId = null;
                    renderMarket();
                    setModal(`
                    <div class="text-center">
                        <div class="w-14 h-14 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center mx-auto mb-4">
                            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
                        </div>
                        <h3 class="text-lg fw-bold text-gray-900 mb-2">참여가 완료되었습니다</h3>
                        <p class="text-sm text-gray-400 mb-4 modal-text-wrap">#${id} 건이 XRPL Testnet 트랜잭션 성공 후 참여 완료 상태로 변경되었습니다.</p>
                        <div class="bg-gray-50 border border-gray-100 rounded-2xl p-4 mb-6 text-left">
                            <p class="text-xs text-gray-400 mb-1">Tx Hash</p>
                            <p class="text-xs fw-bold text-blue-600 modal-text-wrap">${payment.tx_hash}</p>
                        </div>
                        <button onclick="closeModal()" class="w-full h-10 rounded-xl bg-blue-600 text-white text-sm fw-bold hover:bg-blue-700 transition">확인</button>
                    </div>
                `);
                } catch (error) {
                    console.error(error);
                    processingId = null;
                    alert(error.message || 'XRPL Testnet 참여 처리에 실패했습니다.');
                    closeModal();
                }
            }

            function infoRow(label, value) {
                return `<div class="bg-gray-50 border border-gray-100 rounded-2xl p-4"><p class="text-xs text-gray-400 mb-1">${label}</p><p class="text-sm fw-bold text-gray-900 modal-text-wrap">${value}</p></div>`;
            }
            function passportCard(label, value, desc) {
                return `<div class="bg-white border border-gray-200 rounded-2xl p-5"><p class="text-xs text-gray-400 mb-2 fw-bold">${label}</p><p class="text-base fw-bold text-gray-900 mb-3 modal-text-wrap">${value}</p><p class="text-xs text-gray-400 modal-text-wrap">${desc}</p></div>`;
            }
            function setModal(html) {
                const overlay = document.getElementById('modal-overlay');
                const con = document.getElementById('modal-container');
                con.innerHTML = html;
                overlay.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
                setTimeout(() => con.classList.add('show'), 10);
            }
            function closeModal() {
                const overlay = document.getElementById('modal-overlay');
                const con = document.getElementById('modal-container');
                con.classList.remove('show');
                setTimeout(() => { overlay.classList.add('hidden'); document.body.style.overflow = ''; }, 180);
            }

            renderMarketWalletBalance();
            renderMarket();
        </script>
    </body>

</html>
