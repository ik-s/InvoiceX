<!DOCTYPE html>
<html lang="ko">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InvoiceX - 회원가입</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Pretendard -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />

    <style>
      * {
        font-family: "Pretendard", sans-serif;
        letter-spacing: -0.02em;
      }

      body {
        font-weight: 500;
        line-height: 1.5;
      }

      h1 {
        line-height: 1.2;
      }

      .form-alert {
        display: none;
        margin-bottom: 16px;
        border: 1px solid #fecaca;
        border-radius: 12px;
        background: #fef2f2;
        color: #b91c1c;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.45;
        padding: 12px 14px;
      }

      .form-alert.show {
        display: block;
      }

      .field-error {
        border-color: #ef4444 !important;
        background: #fff7f7 !important;
        box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.08) !important;
      }

      .field-message {
        display: none;
        margin-top: 6px;
        color: #dc2626;
        font-size: 11px;
        font-weight: 700;
        line-height: 1.45;
      }

      .field-message.show {
        display: block;
      }

      .role-option-error {
        border-color: #ef4444 !important;
        background: #fff7f7 !important;
        color: #dc2626 !important;
        box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.08) !important;
      }
    </style>
  </head>

  <body class="min-h-screen bg-[#f6f8fc] text-[#171923]">
    <!-- Header -->
    <header class="flex h-[39px] w-full items-center justify-center border-b border-[#e5e8f0] bg-white">
      <a href="start.html" class="text-[14px] font-bold tracking-[-0.02em] text-[#2563eb] no-underline">
        InvoiceX
      </a>
    </header>

    <!-- Signup Main -->
    <main class="flex min-h-[calc(100vh-39px)] items-center justify-center px-6 py-10">
      <article
        class="w-full max-w-[920px] rounded-2xl border border-[#e1e5ee] bg-white px-10 py-10 shadow-[0_10px_28px_rgba(22,31,51,0.04)] max-sm:px-6">

        <!-- Title -->
        <section class="mb-8 text-center">
          <h1 class="mb-2 text-[28px] font-bold leading-[1.2] tracking-[-0.02em] text-[#151923]">
            회원가입
          </h1>

          <p class="text-[14px] font-medium leading-[1.5] tracking-[-0.02em] text-[#7b8494]">
            InvoiceX 서비스 이용을 위해 회원가입하세요.
          </p>
        </section>

        <!-- Form -->
        <form action="#" method="post" class="flex flex-col" novalidate>

          <!-- Input Area -->
          <div class="grid grid-cols-2 gap-x-6 gap-y-5 max-md:grid-cols-1">

            <!-- Email Field -->
            <div>
              <label for="email-signup" class="mb-2 block text-[12px] font-bold tracking-[-0.02em] text-[#242936]">
                이메일 주소
              </label>

              <input id="email-signup" name="email" type="email" placeholder="example@company.com" required
                class="h-12 w-full rounded-lg border border-[#d9dee8] bg-[#f9fafc] px-4 text-[13px] font-medium text-[#2c3340] outline-none placeholder:text-[#a5adbb] transition-colors duration-200 focus:border-[#536be8] focus:bg-white focus:ring-1 focus:ring-[#536be8]/50" />
            </div>

            <!-- Email Verification Field -->
            <div>
              <div class="mb-2 flex items-center justify-between">
                <label for="email-verification" class="block text-[12px] font-bold tracking-[-0.02em] text-[#242936]">
                  이메일 인증
                </label>

                <button type="button" id="requestVerification"
                  class="text-[11px] font-bold text-[#2563eb] hover:text-[#1d4ed8]">
                  요청하기
                </button>
              </div>

              <input id="email-verification" name="email_verification" type="text" placeholder="인증번호를 입력하세요" required
                class="h-12 w-full rounded-lg border border-[#d9dee8] bg-[#f9fafc] px-4 text-[13px] font-medium text-[#2c3340] outline-none placeholder:text-[#a5adbb] transition-colors duration-200 focus:border-[#536be8] focus:bg-white focus:ring-1 focus:ring-[#536be8]/50" />
            </div>

            <!-- Password Field -->
            <div>
              <label for="password-signup" class="mb-2 block text-[12px] font-bold tracking-[-0.02em] text-[#242936]">
                비밀번호
              </label>

              <input id="password-signup" name="password" type="password" placeholder="영어+숫자 10자 이상" required
                class="h-12 w-full rounded-lg border border-[#d9dee8] bg-[#f9fafc] px-4 text-[13px] font-medium text-[#2c3340] outline-none placeholder:text-[#a5adbb] transition-colors duration-200 focus:border-[#536be8] focus:bg-white focus:ring-1 focus:ring-[#536be8]/50" />
            </div>

            <!-- Password Confirm Field -->
            <div>
              <label for="password-confirm" class="mb-2 block text-[12px] font-bold tracking-[-0.02em] text-[#242936]">
                비밀번호 확인
              </label>

              <input id="password-confirm" name="password_confirm" type="password" placeholder="비밀번호를 다시 입력하세요" required
                class="h-12 w-full rounded-lg border border-[#d9dee8] bg-[#f9fafc] px-4 text-[13px] font-medium text-[#2c3340] outline-none placeholder:text-[#a5adbb] transition-colors duration-200 focus:border-[#536be8] focus:bg-white focus:ring-1 focus:ring-[#536be8]/50" />
            </div>
          </div>

          <!-- Role Selection -->
          <div class="mt-7">
            <label class="mb-3 block text-[12px] font-bold tracking-[-0.02em] text-[#242936]">
              역할 선택
            </label>

            <div class="grid grid-cols-3 gap-3 max-md:grid-cols-1">
              <label
                class="role-option cursor-pointer rounded-lg border-2 border-[#d9dee8] bg-[#f9fafc] p-4 text-center text-[13px] font-bold text-[#a5adbb] transition-all duration-200 hover:border-[#536be8] hover:bg-[#f0f4ff] hover:text-[#536be8]">
                <input type="radio" name="role" value="invoice" required class="sr-only" />
                인보이스 등록
              </label>

              <label
                class="role-option cursor-pointer rounded-lg border-2 border-[#d9dee8] bg-[#f9fafc] p-4 text-center text-[13px] font-bold text-[#a5adbb] transition-all duration-200 hover:border-[#536be8] hover:bg-[#f0f4ff] hover:text-[#536be8]">
                <input type="radio" name="role" value="rwa" class="sr-only" />
                RWA 참여
              </label>

              <label
                class="role-option cursor-pointer rounded-lg border-2 border-[#d9dee8] bg-[#f9fafc] p-4 text-center text-[13px] font-bold text-[#a5adbb] transition-all duration-200 hover:border-[#536be8] hover:bg-[#f0f4ff] hover:text-[#536be8]">
                <input type="radio" name="role" value="payment" class="sr-only" />
                대금 지급
              </label>
            </div>
          </div>

          <!-- Company Name Field -->
          <div class="mt-5">
            <label for="company-name" class="mb-2 block text-[12px] font-bold tracking-[-0.02em] text-[#242936]">
              기업명
            </label>

            <input id="company-name" name="company_name" type="text" placeholder="기업명을 입력하세요" required
              class="h-12 w-full rounded-lg border border-[#d9dee8] bg-[#f9fafc] px-4 text-[13px] font-medium text-[#2c3340] outline-none placeholder:text-[#a5adbb] transition-colors duration-200 focus:border-[#536be8] focus:bg-white focus:ring-1 focus:ring-[#536be8]/50" />
          </div>

          <!-- Signup Button -->
          <button type="submit"
            class="mt-7 h-12 w-full rounded-lg bg-[#2563eb] text-[14px] font-bold text-white shadow-[0_4px_12px_rgba(37,99,235,0.25)] transition-all duration-200 hover:bg-[#1d4ed8] hover:shadow-[0_6px_16px_rgba(37,99,235,0.3)] active:bg-[#1e40af]">
            회원가입하기
          </button>

          <!-- Login Link -->
          <p class="mt-5 text-center text-[12px] font-medium text-[#7d8594]">
            이미 계정이 있으신가요?
            <a href="login.html" class="font-bold text-[#4b5fe5] no-underline transition-colors hover:text-[#3d4db8]">
              로그인
            </a>
          </p>
        </form>
      </article>
    </main>

    <script src="../assets/js/api.js"></script>
    <script>
      const signupForm = document.querySelector('form');
      const requestVerification = document.querySelector('#requestVerification');
      const fields = {
        email: document.querySelector('#email-signup'),
        emailVerification: document.querySelector('#email-verification'),
        password: document.querySelector('#password-signup'),
        passwordConfirm: document.querySelector('#password-confirm'),
        companyName: document.querySelector('#company-name')
      };
      const roleOptions = document.querySelectorAll('.role-option');
      const roleGroup = document.querySelector('input[name="role"]')?.closest('.grid');
      const formAlert = document.createElement('p');

      formAlert.className = 'form-alert';
      formAlert.setAttribute('role', 'alert');
      signupForm.prepend(formAlert);

      function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      }

      function isValidPassword(password) {
        return password.length >= 10 && /[A-Za-z]/.test(password) && /\d/.test(password);
      }

      function messageFor(key) {
        let message = signupForm.querySelector(`[data-error-for="${key}"]`);

        if (!message) {
          message = document.createElement('p');
          message.className = 'field-message';
          message.dataset.errorFor = key;

          const anchor = key === 'role' ? roleGroup : fields[key];
          anchor.insertAdjacentElement('afterend', message);
        }

        return message;
      }

      function showFormError(message) {
        formAlert.textContent = message;
        formAlert.classList.add('show');
      }

      function clearFormError() {
        formAlert.textContent = '';
        formAlert.classList.remove('show');
      }

      function clearFormErrorIfNoErrors() {
        if (!signupForm.querySelector('.field-message.show')) {
          clearFormError();
        }
      }

      function setFieldError(key, message) {
        const errorMessage = messageFor(key);
        errorMessage.textContent = message;
        errorMessage.classList.add('show');

        if (key === 'role') {
          roleOptions.forEach(option => option.classList.add('role-option-error'));
          return;
        }

        fields[key].classList.add('field-error');
        fields[key].setAttribute('aria-invalid', 'true');
      }

      function clearFieldError(key) {
        const errorMessage = signupForm.querySelector(`[data-error-for="${key}"]`);
        if (errorMessage) {
          errorMessage.textContent = '';
          errorMessage.classList.remove('show');
        }

        if (key === 'role') {
          roleOptions.forEach(option => option.classList.remove('role-option-error'));
          return;
        }

        fields[key].classList.remove('field-error');
        fields[key].removeAttribute('aria-invalid');
      }

      function clearAllErrors() {
        clearFormError();
        ['email', 'emailVerification', 'password', 'passwordConfirm', 'companyName', 'role']
          .forEach(clearFieldError);
      }

      function focusFirstError(errorKeys) {
        const firstError = errorKeys[0];
        if (!firstError) return;

        if (firstError === 'role') {
          roleGroup?.scrollIntoView({ behavior: 'smooth', block: 'center' });
          return;
        }

        fields[firstError].focus();
      }

      function validateSignupForm() {
        clearAllErrors();

        const email = fields.email.value.trim();
        const emailVerification = fields.emailVerification.value.trim();
        const password = fields.password.value.trim();
        const passwordConfirm = fields.passwordConfirm.value.trim();
        const companyName = fields.companyName.value.trim();
        const role = document.querySelector('input[name="role"]:checked');
        const errorKeys = [];

        if (!email) {
          setFieldError('email', '이메일 주소를 입력해주세요.');
          errorKeys.push('email');
        } else if (!isValidEmail(email)) {
          setFieldError('email', '올바른 이메일 형식으로 입력해주세요.');
          errorKeys.push('email');
        }

        if (!emailVerification) {
          setFieldError('emailVerification', '이메일 인증번호를 입력해주세요.');
          errorKeys.push('emailVerification');
        }

        if (!password) {
          setFieldError('password', '비밀번호를 입력해주세요.');
          errorKeys.push('password');
        } else if (!isValidPassword(password)) {
          setFieldError('password', '비밀번호는 영문과 숫자를 포함해 10자 이상이어야 합니다.');
          errorKeys.push('password');
        }

        if (!passwordConfirm) {
          setFieldError('passwordConfirm', '비밀번호 확인을 입력해주세요.');
          errorKeys.push('passwordConfirm');
        } else if (password && password !== passwordConfirm) {
          setFieldError('passwordConfirm', '비밀번호가 일치하지 않습니다.');
          errorKeys.push('passwordConfirm');
        }

        if (!role) {
          setFieldError('role', '역할을 선택해주세요.');
          errorKeys.push('role');
        }

        if (!companyName) {
          setFieldError('companyName', '기업명을 입력해주세요.');
          errorKeys.push('companyName');
        }

        if (errorKeys.length > 0) {
          showFormError('회원가입 조건을 확인해주세요. 빨간색으로 표시된 항목을 수정하면 다시 시도할 수 있습니다.');
          focusFirstError(errorKeys);
          return null;
        }

        return { email, emailVerification, password, passwordConfirm, role, companyName };
      }

      requestVerification.addEventListener('click', function () {
        const email = fields.email.value.trim();
        clearFieldError('email');
        clearFormErrorIfNoErrors();

        if (!email) {
          setFieldError('email', '이메일 주소를 먼저 입력해주세요.');
          fields.email.focus();
          return;
        }

        if (!isValidEmail(email)) {
          setFieldError('email', '올바른 이메일 형식으로 입력해주세요.');
          fields.email.focus();
          return;
        }

        alert('인증번호가 이메일로 전송되었습니다.');
      });

      signupForm.addEventListener('submit', async function (event) {
        event.preventDefault();

        const validated = validateSignupForm();
        if (!validated) return;

        try {
          const signupData = {
            email: validated.email,
            emailVerification: validated.emailVerification,
            role: validated.role.value,
            companyName: validated.companyName
          };

          await InvoiceXApi.signup({
            email: validated.email,
            password: validated.password,
            user_name: validated.email.split('@')[0],
            role_type: validated.role.value,
            company_name: validated.companyName
          });

          localStorage.setItem('invoiceXSignupData', JSON.stringify(signupData));
          localStorage.setItem('ix_user_role', InvoiceXApi.clientRole(validated.role.value));

          alert('회원가입이 완료되었습니다. 로그인해주세요.');
          window.location.href = 'login.html';
        } catch (error) {
          console.error(error);
          const message = error.message || '회원가입에 실패했습니다.';
          showFormError(message);

          if (error.status === 409 || /email|account/i.test(message)) {
            setFieldError('email', '이미 가입된 이메일입니다. 다른 이메일을 입력해주세요.');
            fields.email.focus();
          } else if (/role/i.test(message)) {
            setFieldError('role', '선택할 수 없는 역할입니다.');
          } else if (/company/i.test(message)) {
            setFieldError('companyName', '기업명 정보를 확인해주세요.');
            fields.companyName.focus();
          }
        }
      });

      // 역할 선택 시각적 효과
      roleOptions.forEach(option => {
        const radio = option.querySelector('input[type="radio"]');

        option.addEventListener('click', function () {
          clearFieldError('role');
          clearFormErrorIfNoErrors();

          roleOptions.forEach(opt => {
            opt.classList.remove('border-[#2563eb]', 'bg-[#2563eb]', 'text-white');
            opt.classList.add('border-[#d9dee8]', 'bg-[#f9fafc]', 'text-[#a5adbb]');
          });

          radio.checked = true;

          option.classList.remove('border-[#d9dee8]', 'bg-[#f9fafc]', 'text-[#a5adbb]');
          option.classList.add('border-[#2563eb]', 'bg-[#2563eb]', 'text-white');
        });
      });

      Object.entries(fields).forEach(([key, field]) => {
        field.addEventListener('input', function () {
          clearFieldError(key);
          clearFormErrorIfNoErrors();
        });
      });
    </script>
  </body>

</html>
