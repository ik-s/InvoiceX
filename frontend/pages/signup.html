<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 | InvoiceX</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="auth-page">
    <header class="auth-header">
      <a href="../start.html" class="auth-logo">InvoiceX</a>
    </header>

    <main>
      <article class="auth-card">
        <section class="auth-panel">
          <h1>회원가입</h1>
          <p>Invoice X 서비스 이용을 위해 회원가입하세요.</p>
        </section>

      <form class="auth-form" action="#" method="post">
        <div class="field-group">
          <label for="email-signup">이메일 주소</label>
          <input id="email-signup" name="email" type="email" placeholder="example@company.com" required>
        </div>
        <div class="field-group">
          <label for="password-signup">비밀번호</label>
          <input id="password-signup" name="password" type="password" placeholder="영어+숫자 10자이상" required>
        </div>
        <div class="field-group">
          <label for="password-confirm">비밀번호 확인</label>
          <input id="password-confirm" name="password_confirm" type="password" placeholder="••••••••••" required>
        </div>
        <div class="field-group">
          <label for="email-verification">이메일 인증</label>
          <input id="email-verification" name="email_verification" type="text" required>
        </div>
        <button class="btn btn-primary" type="submit">회원가입하기</button>
        <p class="form-note">이미 계정이 있으신가요? <a href="login.html">로그인</a></p>
      </form>
    </article>
  </main>
</body>
</html>
