<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InvoiceX - XRPL 기반 RWA 플랫폼</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
  />

  <style>
    * {
      font-family: "Pretendard", sans-serif;
      letter-spacing: -0.02em;
    }

    body {
      font-weight: 500;
      line-height: 1.5;
    }

    .heading-1 {
      font-size: 30px;
      font-weight: 700;
      line-height: 1.2;
    }

    .heading-2 {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.2;
    }

    .heading-3 {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
    }

    .body-main {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.5;
    }

    .nav-menu {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.2;
    }

    .data-small {
      font-size: 12px;
      font-weight: 700;
      line-height: 1.5;
    }

    .price-amount {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.2;
    }
  </style>
</head>

<body class="min-h-screen overflow-hidden font-sans text-[#171923]">
  <div class="relative min-h-screen overflow-hidden bg-gradient-to-b from-white via-[#f8faff] to-[#f4f7fb]">
    <main>
      <!-- Background Circles -->
      <div class="absolute left-[-70px] top-[82px] z-0 h-[300px] w-[300px] rounded-full bg-[#edf3fb] opacity-70"></div>
      <div class="absolute bottom-[48px] right-[-42px] z-0 h-[360px] w-[360px] rounded-full bg-[#edf3fb] opacity-70"></div>

      <!-- Hero Section -->
      <section class="relative z-10 flex min-h-screen items-center justify-center px-5 py-20 text-center">
        <div class="w-full max-w-[760px]">

          <!-- Badge -->
          <p class="mb-[22px] inline-flex items-center justify-center gap-[9px] rounded-full bg-[#e9efff] px-[22px] py-2 text-[12px] font-bold tracking-[-0.02em] text-[#3956c8]">
            <span class="h-[5px] w-[5px] rounded-full bg-[#5570e8]"></span>
            XRPL 기반 RWA 플랫폼
          </p>

          <!-- Main Title -->
          <h1 class="m-0 text-[43px] font-extrabold leading-[1.28] tracking-[-0.05em] text-[#171923] max-md:text-[32px]">
            인보이스를 <span class="text-[#5770e8]">디지털 자산</span>으로 <br />
            바꾸는 가장 쉬운 방법
          </h1>

          <!-- Subtitle -->
          <p class="mt-[27px] text-[14px] leading-[1.75] tracking-[-0.02em] text-[#697180] max-md:text-[13px]">
            Invoice X는 실물 인보이스를 XRPL 위에서 토큰화하고, <br />
            RLUSD 기반 실시간 결제를 지원하는 차세대 RWA 마켓플레이스입니다.
          </p>

          <!-- Start Button -->
          <div class="mt-[29px]">
            <a
              href="login.html"
              class="inline-flex h-[44px] w-[150px] items-center justify-center gap-[6px] rounded-lg bg-[#4864e4] text-[14px] font-bold text-white no-underline shadow-[0_12px_24px_rgba(72,100,228,0.25)] transition duration-200 hover:-translate-y-0.5 hover:bg-[#3f58d2] hover:shadow-[0_16px_28px_rgba(72,100,228,0.32)]"
            >
              시작하기 <span class="text-[15px]">→</span>
            </a>
          </div>

          <!-- Tech Tags -->
          <div class="mt-16 flex items-center justify-center gap-[13px] max-md:mt-12">
            <span class="inline-flex h-[22px] min-w-[70px] items-center justify-center rounded-[5px] border border-[#d9dee8] bg-white/80 px-[18px] text-[11px] font-bold text-[#202431]">
              XRPL
            </span>

            <span class="inline-flex h-[22px] min-w-[70px] items-center justify-center rounded-[5px] border border-[#d9dee8] bg-white/80 px-[18px] text-[11px] font-bold text-[#202431]">
              RLUSD
            </span>

            <span class="inline-flex h-[22px] min-w-[70px] items-center justify-center rounded-[5px] border border-[#d9dee8] bg-white/80 px-[18px] text-[11px] font-bold text-[#202431]">
              RWA Tokenized
            </span>
          </div>

        </div>
      </section>
    </main>
  </div>
</body>
</html>
