<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정산 내역 - InvoiceX</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");
        body { font-family: "Inter", sans-serif; }
        .tab-active { background-color: #1d4ed8; color: #fff; border-color: #1d4ed8; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Nav -->
    <nav class="fixed top-0 left-0 w-full bg-white border-b border-gray-200 z-50">
        <div class="max-w-screen-xl mx-auto flex items-center justify-between px-4 sm:px-6 lg:px-8 h-16">
            <div class="flex items-center min-w-0">
                <div class="text-blue-600 text-xl sm:text-2xl font-bold flex-shrink-0">InvoiceX</div>
                <span class="bg-green-50 text-green-700 text-xs font-bold py-1 px-2 rounded-xl ml-2 sm:ml-3 flex-shrink-0 hidden sm:inline-block">자금 공급자</span>
                <div class="flex items-center ml-6 sm:ml-12 lg:ml-24 space-x-3 sm:space-x-5">
                    <a href="portfolio.html" class="text-gray-500 text-sm sm:text-base whitespace-nowrap">포트폴리오</a>
                    <a href="rwamarket.html" class="text-gray-500 text-sm sm:text-base whitespace-nowrap">RWA 마켓</a>
                    <a href="정산.html" class="text-blue-600 text-sm sm:text-base font-bold whitespace-nowrap relative pb-1 border-b-2 border-blue-600">정산 내역</a>
                </div>
            </div>
            <div class="flex items-center space-x-2 border border-gray-200 rounded-md py-1 px-2 flex-shrink-0 ml-4">
                <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                <span class="text-gray-800 text-xs sm:text-sm font-bold">Testnet</span>
                <span class="text-gray-500 text-xs sm:text-sm hidden sm:inline">rN7d...x3Kq</span>
            </div>
        </div>
    </nav>

    <!-- 상세 보기 모달 -->
    <div id="detailModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden items-center justify-center">
        <div class="bg-white rounded-2xl p-6 sm:p-8 max-w-lg w-full mx-4 shadow-xl">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-lg font-bold text-gray-900" id="modalTitle">정산 상세</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div id="modalBody"></div>
            <div class="mt-6 flex justify-end">
                <button onclick="closeModal()" class="bg-gray-100 text-gray-700 font-semibold text-sm rounded-lg px-6 py-3 hover:bg-gray-200">닫기</button>
            </div>
        </div>
    </div>

    <!-- Main -->
    <main class="max-w-screen-xl mx-auto pt-28 sm:pt-32 pb-16 px-4 sm:px-6 lg:px-8">

        <!-- 헤더 -->
        <div class="text-center mb-8">
            <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 mb-2">정산 내역</h1>
            <p class="text-sm sm:text-base text-gray-500">투자한 RWA 자산의 스마트 컨트랙트(Escrow) 상태 및 정산 완료 내역을 확인합니다.</p>
        </div>

        <!-- 요약 카드 2개 -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6 mb-10">
            <div class="bg-white border border-gray-200 rounded-xl py-6 px-6">
                <p class="text-sm text-gray-500 mb-2">정산 대기 중인 자산 (Escrow Locked)</p>
                <div class="flex items-end justify-between">
                    <p class="text-3xl sm:text-4xl font-bold text-gray-900">XX,XXX <span class="text-lg font-semibold text-gray-500">RLUSD</span></p>
                    <span class="text-sm font-bold text-green-600">X 건 진행 중</span>
                </div>
            </div>
            <div class="bg-blue-50 border-2 border-blue-400 rounded-xl py-6 px-6">
                <p class="text-sm text-gray-500 mb-2">누적 정산 완료 금액 (원금 + 수익)</p>
                <div class="flex items-end justify-between">
                    <p class="text-3xl sm:text-4xl font-bold text-blue-600">XXX,XXX <span class="text-lg font-semibold text-blue-400">RLUSD</span></p>
                    <span class="text-sm font-bold text-blue-600">총 XX 건 완료</span>
                </div>
            </div>
        </div>

        <!-- 테이블 섹션 -->
        <div class="mb-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <h2 class="text-lg sm:text-xl font-bold text-gray-900">투자 자산 정산 현황</h2>
            <div class="flex gap-2">
                <button onclick="filterTable('all')" id="tab-all" class="tab-active py-2 px-4 border text-xs sm:text-sm font-bold rounded-lg">전체</button>
                <button onclick="filterTable('pending')" id="tab-pending" class="py-2 px-4 bg-white border border-gray-200 text-gray-500 text-xs sm:text-sm font-bold rounded-lg">정산 대기</button>
                <button onclick="filterTable('settle')" id="tab-settle" class="py-2 px-4 bg-white border border-gray-200 text-gray-500 text-xs sm:text-sm font-bold rounded-lg">정산하기</button>
                <button onclick="filterTable('done')" id="tab-done" class="py-2 px-4 bg-white border border-gray-200 text-gray-500 text-xs sm:text-sm font-bold rounded-lg">정산 완료</button>
            </div>
        </div>

        <!-- 테이블 -->
        <div class="bg-white border border-gray-200 rounded-xl overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="border-b border-gray-200">
                        <th class="py-4 px-6 text-xs sm:text-sm font-semibold text-gray-500">RWA 자산 정보</th>
                        <th class="py-4 px-6 text-xs sm:text-sm font-semibold text-gray-500">투자 금액 (RLUSD)</th>
                        <th class="py-4 px-6 text-xs sm:text-sm font-semibold text-gray-500">만기 정산일</th>
                        <th class="py-4 px-6 text-xs sm:text-sm font-semibold text-gray-500">진행 상태</th>
                        <th class="py-4 px-6 text-xs sm:text-sm font-semibold text-gray-500">관리</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <!-- 전체 보기 버튼 -->
        <div class="text-center mt-6" id="showMoreWrap">
            <button onclick="showAll()" id="showMoreBtn" class="bg-white border border-gray-300 text-gray-700 font-semibold text-sm rounded-lg px-8 py-3 hover:bg-gray-50">전체 보기 ▼</button>
        </div>

    </main>

    <script>
        const allData = [
            { id: '#INV-XXXX-0001', name: '발행 기업 1', amount: 'XX,XXX', date: 'YYYY.MM.DD', status: 'pending' },
            { id: '#INV-XXXX-0002', name: '발행 기업 2', amount: 'XX,XXX', date: 'YYYY.MM.DD', status: 'pending' },
            { id: '#INV-XXXX-0003', name: '발행 기업 3', amount: 'XX,XXX', date: 'YYYY.MM.DD', status: 'settle' },
            { id: '#INV-XXXX-0004', name: '발행 기업 4', amount: 'XX,XXX', date: 'YYYY.MM.DD', status: 'settle' },
            { id: '#INV-XXXX-0005', name: '발행 기업 5', amount: 'XX,XXX', date: 'YYYY.MM.DD', status: 'pending' },
            { id: '#INV-XXXX-0006', name: '발행 기업 6', amount: 'XX,XXX', date: 'YYYY.MM.DD', status: 'done' },
            { id: '#INV-XXXX-0007', name: '발행 기업 7', amount: 'XX,XXX', date: 'YYYY.MM.DD', status: 'done' },
            { id: '#INV-XXXX-0008', name: '발행 기업 8', amount: 'XX,XXX', date: 'YYYY.MM.DD', status: 'settle' },
            { id: '#INV-XXXX-0009', name: '발행 기업 9', amount: 'XX,XXX', date: 'YYYY.MM.DD', status: 'pending' },
            { id: '#INV-XXXX-0010', name: '발행 기업 10', amount: 'XX,XXX', date: 'YYYY.MM.DD', status: 'done' },
            { id: '#INV-XXXX-0011', name: '발행 기업 11', amount: 'XX,XXX', date: 'YYYY.MM.DD', status: 'done' },
            { id: '#INV-XXXX-0012', name: '발행 기업 12', amount: 'XX,XXX', date: 'YYYY.MM.DD', status: 'done' },
        ];

        let showCount = 3;
        let currentFilter = 'all';

        function getStatusBadge(status) {
            if (status === 'pending') return '<span class="text-xs font-bold text-yellow-700 bg-yellow-50 border border-yellow-200 py-1 px-3 rounded-full">Escrow 진행중</span>';
            if (status === 'settle') return '<span class="text-xs font-bold text-blue-700 bg-blue-50 border border-blue-200 py-1 px-3 rounded-full">정산하기</span>';
            return '<span class="text-xs font-bold text-green-700 bg-green-50 border border-green-200 py-1 px-3 rounded-full">정산 완료</span>';
        }

        function getActionBtn(status, index) {
            if (status === 'pending') return `<button onclick="showDetail('pending', ${index})" class="py-1.5 px-4 bg-white border border-gray-200 text-sm font-semibold text-gray-700 rounded-lg hover:bg-gray-50">상세 보기</button>`;
            if (status === 'settle') return `<a href="정산화면.html" class="py-1.5 px-4 bg-blue-600 text-white text-sm font-semibold rounded-lg hover:bg-blue-700 inline-block text-center">정산하기</a>`;
            return `<button onclick="showDetail('done', ${index})" class="py-1.5 px-4 bg-white border border-gray-200 text-sm font-semibold text-gray-400 rounded-lg hover:bg-gray-50">영수증 보기</button>`;
        }

        function getRowClass(status) {
            if (status === 'done') return 'bg-gray-50';
            return '';
        }

        function getTextClass(status) {
            if (status === 'done') return 'text-gray-400';
            return 'text-gray-900';
        }

        function getSubTextClass(status) {
            if (status === 'done') return 'text-gray-300';
            return 'text-gray-400';
        }

        function renderTable() {
            const filtered = currentFilter === 'all' ? allData : allData.filter(d => d.status === currentFilter);
            const visible = filtered.slice(0, showCount);
            const tbody = document.getElementById('tableBody');

            tbody.innerHTML = visible.map((item, i) => `
                <tr class="border-b border-gray-100 ${getRowClass(item.status)}" data-status="${item.status}">
                    <td class="py-5 px-6">
                        <p class="text-xs ${getSubTextClass(item.status)}">${item.id}</p>
                        <p class="text-sm font-bold ${getTextClass(item.status)}">${item.name}</p>
                    </td>
                    <td class="py-5 px-6 text-sm font-bold ${getTextClass(item.status)}">${item.amount}</td>
                    <td class="py-5 px-6 text-sm ${item.status === 'done' ? 'text-gray-400' : 'text-gray-700'}">${item.date}</td>
                    <td class="py-5 px-6">${getStatusBadge(item.status)}</td>
                    <td class="py-5 px-6">${getActionBtn(item.status, i)}</td>
                </tr>
            `).join('');

            // 전체 보기 버튼 표시/숨김
            const btn = document.getElementById('showMoreBtn');
            const wrap = document.getElementById('showMoreWrap');
            if (showCount >= filtered.length) {
                wrap.style.display = 'none';
            } else {
                wrap.style.display = '';
                btn.textContent = `전체 보기 (${filtered.length - showCount}건 더) ▼`;
            }
        }

        function showAll() {
            showCount = 999;
            renderTable();
        }

        function filterTable(type) {
            currentFilter = type;
            showCount = 3;

            const tabs = ['tab-all', 'tab-pending', 'tab-settle', 'tab-done'];
            tabs.forEach(id => {
                const el = document.getElementById(id);
                el.classList.remove('tab-active');
                el.classList.add('bg-white', 'text-gray-500', 'border-gray-200');
            });
            const activeTab = document.getElementById('tab-' + type);
            activeTab.classList.add('tab-active');
            activeTab.classList.remove('bg-white', 'text-gray-500', 'border-gray-200');

            renderTable();
        }

        // 상세 모달
        function showDetail(status, index) {
            const filtered = currentFilter === 'all' ? allData : allData.filter(d => d.status === currentFilter);
            const item = filtered[index];
            let title, html;

            if (status === 'pending') {
                title = '정산 상세 — Escrow 진행중';
                html = `
                    <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4 mb-5">
                        <p class="text-xs font-semibold text-gray-500 mb-1">⏳ Escrow 상태</p>
                        <p class="text-2xl font-bold text-yellow-700 mb-1">D-XX</p>
                        <p class="text-xs text-gray-600">만기 정산 예정일까지 남은 일수</p>
                    </div>
                    <div class="space-y-3">
                        <div class="flex justify-between py-2 border-b border-gray-100"><span class="text-sm text-gray-500">인보이스 번호</span><span class="text-sm font-semibold text-gray-900">${item.id}</span></div>
                        <div class="flex justify-between py-2 border-b border-gray-100"><span class="text-sm text-gray-500">발행 기업</span><span class="text-sm font-semibold text-gray-900">${item.name}</span></div>
                        <div class="flex justify-between py-2 border-b border-gray-100"><span class="text-sm text-gray-500">투자 금액</span><span class="text-sm font-semibold text-gray-900">${item.amount} RLUSD</span></div>
                        <div class="flex justify-between py-2 border-b border-gray-100"><span class="text-sm text-gray-500">Escrow 상태</span><span class="text-sm font-bold text-yellow-700">Locked</span></div>
                        <div class="flex justify-between py-2 border-b border-gray-100"><span class="text-sm text-gray-500">만기 정산일</span><span class="text-sm font-semibold text-gray-900">${item.date}</span></div>
                        <div class="flex justify-between py-2"><span class="text-sm text-gray-500">정산 예정 금액 (원금+수익)</span><span class="text-sm font-bold text-blue-600">XX,XXX RLUSD</span></div>
                    </div>`;
            } else {
                title = '정산 완료 내역';
                html = `
                    <div class="bg-green-50 border border-green-200 rounded-xl p-4 mb-5">
                        <div class="flex items-center gap-2 mb-1">
                            <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                            <p class="text-sm font-bold text-green-700">정산 완료</p>
                        </div>
                        <p class="text-xs text-gray-600">원금과 수익이 지갑으로 정산되었습니다.</p>
                    </div>
                    <div class="space-y-3">
                        <div class="flex justify-between py-2 border-b border-gray-100"><span class="text-sm text-gray-500">인보이스 번호</span><span class="text-sm font-semibold text-gray-900">${item.id}</span></div>
                        <div class="flex justify-between py-2 border-b border-gray-100"><span class="text-sm text-gray-500">발행 기업</span><span class="text-sm font-semibold text-gray-900">${item.name}</span></div>
                        <div class="flex justify-between py-2 border-b border-gray-100"><span class="text-sm text-gray-500">투자 원금</span><span class="text-sm font-semibold text-gray-900">XX,XXX RLUSD</span></div>
                        <div class="flex justify-between py-2 border-b border-gray-100"><span class="text-sm text-gray-500">수익 금액</span><span class="text-sm font-bold text-blue-600">+X,XXX RLUSD</span></div>
                        <div class="flex justify-between py-2 border-b border-gray-100"><span class="text-sm text-gray-500">총 정산 금액</span><span class="text-sm font-bold text-gray-900">XX,XXX RLUSD</span></div>
                        <div class="flex justify-between py-2"><span class="text-sm text-gray-500">정산 완료일</span><span class="text-sm font-semibold text-gray-900">${item.date}</span></div>
                    </div>`;
            }

            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = html;
            const modal = document.getElementById('detailModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeModal() {
            const modal = document.getElementById('detailModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // 초기 렌더
        renderTable();
    </script>

</body>
</html>
