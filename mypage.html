<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvoiceX - 통합 대시보드</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        /* ── 폰트 시스템: Light(300) + SemiBold(600) 딱 두 종류만 ── */
        body { font-family: "Pretendard", sans-serif; font-weight: 300; -webkit-font-smoothing: antialiased; letter-spacing: -0.02em; background-color: #f8fafc; }
        .fw-bold { font-weight: 600 !important; }
        /* 
           font-size 체계 (4단계 + 강조 1단계):
           xs(0.75rem)  = 라벨·태그·보조
           sm(0.875rem) = 본문·테이블
           base(1rem)   = 소제목·섹션헤더
           lg(1.125rem) = 모달제목·카드제목
           xl(1.25rem)  = 페이지 타이틀
           2xl(1.5rem)  = 핵심 숫자 강조
        */
        
        @keyframes slideDown { from { opacity: 1; max-height: 100px; padding: 16px; margin-bottom: 8px; } to { opacity: 0; max-height: 0; padding: 0; margin-bottom: 0; border-width: 0; } }
        .alert-read { animation: slideDown .4s ease forwards; overflow: hidden; pointer-events: none; }
        .red-dot { width: 5px; height: 5px; border-radius: 50%; background: #ef4444; flex-shrink: 0; }
        
        .rwa-slider { display: flex; overflow-x: auto; overflow-y: visible; gap: 1rem; padding: 0.5rem 0.25rem 0.75rem; scroll-behavior: smooth; scroll-snap-type: x mandatory; }
        .rwa-card { flex: 0 0 280px; scroll-snap-align: start; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #e5e7eb; }
        .rwa-card:hover { transform: translateY(-3px); border-color: #3b82f6; box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.08); }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .saas-card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.03); }

        .wallet-addr { font-family: "Pretendard", monospace; font-size: 11px; letter-spacing: 0.02em; word-break: break-all; color: #64748b; }
        .text-wrap-safe { white-space: normal; overflow-wrap: anywhere; word-break: keep-all; line-height: 1.55; }
        .badge-nowrap { width: 108px; height: 26px; display: inline-flex; align-items: center; justify-content: center; padding: 0 10px; box-sizing: border-box; white-space: nowrap; font-size: 10px; line-height: 1; }
        .table-action-btn { min-width: 76px; height: 32px; display: inline-flex; align-items: center; justify-content: center; padding: 0 14px; border-radius: 12px; font-size: 12px; line-height: 1; white-space: nowrap; font-weight: 600; transition: all .15s ease; }
        .table-status-badge { width: 82px; height: 28px; display: inline-flex; align-items: center; justify-content: center; padding: 0 10px; box-sizing: border-box; border-radius: 9999px; font-size: 11px; line-height: 1; white-space: nowrap; font-weight: 600; }
        .funder-settlement-badge { width: 92px; height: 28px; display: inline-flex; align-items: center; justify-content: center; padding: 0 10px; box-sizing: border-box; border-radius: 9999px; font-size: 11px; line-height: 1; white-space: nowrap; font-weight: 600; }
    </style>
</head>
<body class="text-gray-900">

    <!-- ── NAV ── -->
    <nav class="fixed top-0 left-0 w-full bg-white border-b border-gray-100 z-50 h-14 flex items-center">
        <div class="max-w-7xl mx-auto w-full flex items-center justify-between px-6">
            <div class="flex items-center space-x-10">
                <div class="text-blue-600 text-xl fw-bold cursor-pointer" onclick="goRoleHome()">InvoiceX</div>
                <div id="nav-menu" class="hidden md:flex space-x-8 text-sm text-gray-400">
                </div>
            </div>
            
            <button onclick="location.href='role-select.html'" class="text-xs text-gray-400 hover:text-red-500 transition flex items-center gap-1.5">
                로그아웃
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
            </button>
        </div>
    </nav>

    <!-- ── HEADER CARD ── -->
    <main class="pt-20 pb-16 max-w-7xl mx-auto px-6">
        
        <section class="saas-card p-6 mb-8 flex items-center justify-between">
            <div class="flex items-center gap-5">
                <div class="w-14 h-14 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center flex-shrink-0 shadow-inner">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                </div>
                <div>
                    <h1 class="text-xl fw-bold text-gray-900 mb-1">InvoiceX</h1>
                    <div id="kyb-status" class="text-gray-400 text-xs flex items-center gap-1.5 uppercase"></div>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <span id="role-badge" class="bg-blue-50 text-blue-600 border border-blue-100 px-5 h-10 inline-flex items-center justify-center rounded-xl text-sm fw-bold gap-2 shadow-sm">역할</span>
                <button id="wallet-btn" onclick="toggleWallet()" class="bg-gray-900 hover:bg-black text-white px-8 h-11 inline-flex items-center justify-center rounded-xl text-sm transition gap-2 shadow-md">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
                    지갑 연결
                </button>
            </div>
        </section>

        <!-- ── MAIN GRID ── -->
        <div id="main-content" class="hidden">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                
                <div class="lg:col-span-8 space-y-8">
                    <!-- RWA 슬라이더 -->
                    <div id="rwa-section">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="text-base fw-bold text-gray-900 uppercase tracking-wider">진행 중인 RWA</h2>
                            <div class="flex gap-1">
                                <button onclick="scrollRWA(-296)" class="w-7 h-7 rounded-full border border-gray-200 flex items-center justify-center text-gray-400 hover:bg-gray-100 transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg></button>
                                <button onclick="scrollRWA(296)" class="w-7 h-7 rounded-full border border-gray-200 flex items-center justify-center text-gray-400 hover:bg-gray-100 transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg></button>
                            </div>
                        </div>
                        <div id="rwa-slider" class="rwa-slider no-scrollbar"></div>
                    </div>

                    <!-- 탭 영역 -->
                    <div class="saas-card overflow-hidden">
                        <div class="flex border-b border-gray-100 bg-white px-1" id="tab-headers"></div>
                        <div id="tab-content" class="p-8"></div>
                    </div>
                </div>

                <!-- 알림 사이드바 -->
                <div class="lg:col-span-4">
                    <div class="saas-card sticky top-20 overflow-hidden shadow-sm">
                        <div class="px-5 py-4 border-b border-gray-50 flex justify-between items-center">
                            <h2 class="text-base fw-bold text-gray-900 uppercase tracking-wider">최신 알림</h2>
                            <button onclick="openReadHistory()" class="text-xs text-gray-400 hover:text-blue-600 transition">알림확인</button>
                        </div>
                        <div id="alert-list" class="divide-y divide-gray-50 min-h-[300px] max-h-[500px] overflow-y-auto"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- KYB 미인증 안내 -->
        <div id="kyb-notice" class="hidden saas-card p-16 text-center mt-8 max-w-xl mx-auto">
            <h2 class="text-lg fw-bold text-gray-900 mb-2">기업 인증이 필요합니다</h2>
            <p class="text-sm text-gray-400 mb-8 leading-relaxed">InvoiceX의 모든 기능을 이용하시려면<br>기업 인증(KYB)을 먼저 완료해 주세요.</p>
            <button onclick="window.location.href='kyb.html'" class="px-8 h-10 bg-blue-600 text-white rounded-xl fw-bold text-sm hover:bg-blue-700 transition">KYB 인증 시작하기</button>
        </div>
    </main>

    <!-- ── MODAL ── -->
    <div id="modal-overlay" class="fixed inset-0 bg-black bg-opacity-40 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-sm" onclick="closeModal()">
        <div id="modal-container" class="bg-white w-full max-w-sm rounded-2xl p-8 shadow-2xl transform transition-all scale-95 opacity-0 duration-300" onclick="event.stopPropagation()"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const role = params.get('role') || 'funder';
        const isKyb = params.get('kyb') !== 'false';

        /* 데모 지갑 주소 */
        const WALLET_ADDR = 'rHb9CJAWyB4rj91VRWn96DkukG4bwdtyTh';

        const ROLE_DATA = {
            funder: {
                label: '자금공급자',
                nav: [
                    { n: '마이페이지', l: 'mypage.html?role=funder' },
                    { n: 'RWA 마켓', l: 'rwamarket.html' }
                ],
                tabs: ['포트폴리오', '정산 내역']
            },
            registrar: {
                label: '인보이스 등록자',
                nav: [
                    { n: '마이페이지', l: 'mypage.html?role=registrar' },
                    { n: '인보이스 등록', l: 'register.html' }
                ],
                tabs: ['대금 수령', '등록 현황']
            },
            payer: {
                label: '대금지급기업',
                nav: [
                    { n: '마이페이지', l: 'mypage.html?role=payer' },
                    { n: '인보이스 확인', l: 'invoice.html' },
                    { n: '대금 지급', l: 'payment.html' }
                ],
                tabs: ['채무 현황', '지급 스케줄']
            }
        };


        function getMyPagePath() {
            const currentFile = window.location.pathname.split('/').pop() || 'mypage.html';
            return currentFile.startsWith('mypage') ? currentFile : 'mypage.html';
        }

        function buildRoleUrl(path, targetRole = role) {
            const query = new URLSearchParams();
            query.set('role', targetRole);
            if (!isKyb) query.set('kyb', 'false');
            return `${path}?${query.toString()}`;
        }

        function goRoleHome() {
            location.href = buildRoleUrl(getMyPagePath(), role);
        }

        let alerts = [];
        let historyAlerts = [];

        const ROLE_ALERTS = {
            funder: [
                { id: 1, title: "정산 완료 안내", content: "인보이스 #INV-0042 건의 정산이 지갑으로 완료되었습니다.", time: "방금 전" },
                { id: 2, title: "신규 RWA 등록", content: "투자 마켓에 '현대자동차 공급망 매출채권' 상품이 새롭게 등록되었습니다.", time: "2시간 전" }
            ],
            registrar: [
                { id: 1, title: "인보이스 승인 완료", content: "인보이스 #INV-0042 건이 심사를 통과하여 RWA로 등록되었습니다.", time: "방금 전" },
                { id: 2, title: "대금 수령 가능", content: "삼성전자 외 1건의 수령 가능 금액이 갱신되었습니다.", time: "1시간 전" }
            ],
            payer: [
                { id: 1, title: "지급 기일 임박", content: "#INV-2026-0042 건의 지급 만기가 D-3 남았습니다.", time: "방금 전" },
                { id: 2, title: "서류대조 요청", content: "#INV-0043 건의 서류대조가 필요합니다.", time: "1시간 전" },
                { id: 3, title: "관리자 승인 대기", content: "#INV-0044 건이 관리자 승인 대기 상태입니다.", time: "3시간 전" }
            ]
        };

        function init() {
            const config = ROLE_DATA[role];
            alerts = ROLE_ALERTS[role] || ROLE_ALERTS.funder;
            document.getElementById('role-badge').innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5"/></svg>${config.label}`;
            
            if (isKyb) {
                document.getElementById('kyb-status').innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-blue-600"></span>KYB 인증 완료`;
                document.getElementById('main-content').classList.remove('hidden');
                renderNav(config.nav);
                renderAlerts();
                if(role === 'registrar') renderRWA(); else document.getElementById('rwa-section').style.display='none';
                renderTabs(config.tabs);
            } else {
                document.getElementById('kyb-status').innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-red-500"></span>인증 미완료`;
                document.getElementById('kyb-notice').classList.remove('hidden');
            }
        }

        function renderNav(list) {
            const currentPath = window.location.pathname.split('/').pop() || 'mypage.html';
            const currentSearch = window.location.search;
            document.getElementById('nav-menu').innerHTML = list.map(m => {
                const [linkPath, linkQuery = ''] = m.l.split('?');
                const isCurrent = currentPath === linkPath && (!linkQuery || currentSearch === `?${linkQuery}`);
                const cls = `hover:text-blue-600 transition ${isCurrent ? 'text-blue-600 fw-bold border-b-2 border-blue-600 pb-0.5' : ''}`;
                return `<a href="${m.l}" class="${cls}">${m.n}</a>`;
            }).join('');
        }

        function renderAlerts() {
            const list = document.getElementById('alert-list');
            if(!alerts.length) { list.innerHTML = `<div class="flex flex-col items-center justify-center py-16 text-gray-300"><svg class="w-12 h-12 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg><p class="text-sm text-gray-400">새로운 알림이 없습니다</p><p class="text-xs text-gray-300 mt-1">활동이 있으면 여기에 표시됩니다</p></div>`; return; }
            list.innerHTML = alerts.map(a => `
                <div id="alert-${a.id}" class="p-5 bg-white hover:bg-gray-50 transition cursor-pointer flex items-start gap-3" onclick="clickAlert(${a.id})">
                    <div class="red-dot mt-1.5"></div>
                    <div class="flex-1">
                        <p class="text-sm fw-bold text-gray-900 mb-1 leading-tight">${a.title}</p>
                        <p class="text-xs text-gray-400 text-wrap-safe">${a.content}</p>
                        <span class="text-xs text-gray-400 mt-1.5 block">${a.time}</span>
                    </div>
                </div>`).join('');
        }

        function clickAlert(id) {
            const el = document.getElementById(`alert-${id}`); el.classList.add('alert-read');
            const data = alerts.find(x => x.id === id);
            setTimeout(() => {
                historyAlerts.push(data); alerts = alerts.filter(x => x.id !== id);
                renderAlerts(); openInfoModal(data.title, data.content);
            }, 500);
        }

        function renderRWA() {
            const slider = document.getElementById('rwa-slider');
            const rwas = [
                { id: 'INV-0042', title: '삼성전자 매출채권', d: 'D-45', p: '75%', a: '8.5%', invest: '20,000', maturity: '2026.06.26', issuer: '삼성전자(주)', status: '정산 진행중' },
                { id: 'INV-0035', title: '현대자동차 부품대금', d: 'D-29', p: '50%', a: '7.2%', invest: '15,000', maturity: '2026.06.10', issuer: '현대자동차(주)', status: '정산 진행중' },
                { id: 'INV-0088', title: 'LG디스플레이 공급망', d: 'D-12', p: '90%', a: '9.1%', invest: '10,000', maturity: '2026.05.24', issuer: 'LG디스플레이(주)', status: '만기 임박' }
            ];
            slider.innerHTML = rwas.map(i => `
                <div class="rwa-card bg-white p-5 rounded-2xl cursor-pointer flex-shrink-0" onclick="openRWADetail('${i.id}', '${i.title}', '${i.a}', '${i.invest}', '${i.maturity}', '${i.issuer}', '${i.status}')">
                    <div class="flex justify-between items-start mb-3">
                        <span class="text-xs text-gray-400">#${i.id}</span>
                        <span class="text-blue-600 text-sm fw-bold">${i.d}</span>
                    </div>
                    <h3 class="fw-bold text-sm text-gray-900 mb-3">${i.title}</h3>
                    <div class="w-full bg-gray-100 h-1.5 rounded-full overflow-hidden mb-2"><div class="bg-blue-600 h-full" style="width:${i.p}"></div></div>
                    <div class="flex justify-between text-xs text-gray-400">
                        <span>수익률 <span class="fw-bold">${i.a}</span></span>
                        <span>투자 <span class="fw-bold text-gray-600">${i.invest} RLUSD</span></span>
                    </div>
                </div>`).join('');
        }
        function scrollRWA(amt) { document.getElementById('rwa-slider').scrollBy({ left: amt, behavior: 'smooth' }); }

        const PAYER_DEBTS = [
            { id: '#INV-2026-0042', corp: '(주)한빛테크', amount: '₩49,000,000', due: 'D-3', status: '지급 대기', urgent: true, action: '지금 지급', href: 'payment.html?invoice=INV-2026-0042' },
            { id: '#INV-0043', corp: '대한건설(주)', amount: '₩120,000,000', due: '2026.08.01', status: '서류대조', urgent: false, action: '확인하기', href: 'invoice.html?invoice=INV-0043' },
            { id: '#INV-0044', corp: '에이스무역', amount: '₩35,000,000', due: '2026.06.20', status: '관리자 승인 대기', urgent: false, action: '대기중', href: '' },
            { id: '#INV-2026-0039', corp: '대한건설(주)', amount: '₩32,000,000', due: '지급 완료', status: '지급 완료', urgent: false, action: '완료', href: '' }
        ];
        let payerDebtFilter = '전체';

        function payerStatusBadge(item) {
            if (item.urgent && item.status === '지급 대기') return `<span class="bg-red-50 text-red-500 badge-nowrap fw-bold px-2.5 py-1 rounded-full border border-red-100">만기 임박 ${item.due}</span>`;
            if (item.status === '서류대조') return `<span class="bg-blue-50 text-blue-600 badge-nowrap fw-bold px-2.5 py-1 rounded-full border border-blue-100">서류대조</span>`;
            if (item.status === '관리자 승인 대기') return `<span class="bg-gray-50 text-gray-500 badge-nowrap fw-bold px-2.5 py-1 rounded-full border border-gray-100">관리자 승인 대기</span>`;
            if (item.status === '지급 대기') return `<span class="bg-orange-50 text-orange-600 badge-nowrap fw-bold px-2.5 py-1 rounded-full border border-orange-100">지급 대기</span>`;
            return `<span class="bg-gray-100 text-gray-400 badge-nowrap fw-bold px-2.5 py-1 rounded-full border border-gray-100">지급 완료</span>`;
        }

        function payerActionButton(item) {
            if (!item.href) return `<button class="px-4 h-8 rounded-xl bg-gray-100 text-gray-400 text-xs fw-bold cursor-default" disabled>${item.action}</button>`;
            const color = item.urgent ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-blue-600 hover:bg-blue-700 text-white';
            return `<button onclick="event.stopPropagation(); location.href='${item.href}'" class="px-4 h-8 rounded-xl ${color} text-xs fw-bold transition">${item.action}</button>`;
        }

        function setPayerDebtFilter(filter) {
            payerDebtFilter = filter;
            renderPayerDebtList();
        }

        function renderPayerDebtList() {
            const filters = ['전체', '서류대조', '관리자 승인 대기', '지급 대기', '지급 완료'];
            const filterWrap = document.getElementById('payer-debt-filters');
            const list = document.getElementById('payer-debt-list');
            if (!filterWrap || !list) return;

            filterWrap.innerHTML = filters.map(f => {
                const active = payerDebtFilter === f;

                    <div class="flex justify-between border-b border-gray-200 pb-2.5"><span class="text-gray-400">정산 대상</span><span class="fw-bold text-gray-900">${item.id}</span></div>
                    <div class="flex justify-between border-b border-gray-200 pb-2.5"><span class="text-gray-400">수령 지갑</span><span class="wallet-addr fw-bold">${WALLET_ADDR.slice(0,6)}...${WALLET_ADDR.slice(-4)}</span></div>
                    <div class="flex justify-between border-b border-gray-200 pb-2.5"><span class="text-gray-400">정산 후 상태</span><span class="fw-bold text-blue-600">정산 완료</span></div>
                    <div class="flex justify-between"><span class="text-gray-400">최종 정산 금액</span><span class="fw-bold text-blue-600">${item.expected} RLUSD</span></div>
                </div>
                <div class="flex gap-3">
                    <button onclick="closeModal()" class="flex-1 h-10 flex items-center justify-center bg-gray-100 text-gray-400 rounded-xl text-sm fw-bold">취소</button>
                    <button onclick="confirmFunderSettlement('${item.id}', '${item.expected}')" class="flex-1 h-10 flex items-center justify-center bg-blue-600 text-white rounded-xl text-sm fw-bold hover:bg-blue-700 transition">정산 실행</button>
                </div>`;
            showModal();
        }

        function confirmFunderSettlement(id, amount) {
            const settlement = FUNDER_SETTLEMENTS.find(item => item.id === id);
            if (settlement) {
                settlement.status = 'done';
                settlement.tx = '0xSETTLE...' + id.replace(/[^0-9]/g, '').slice(-4);
            }

            const portfolio = FUNDER_PORTFOLIO.find(item => item.id === id);
            if (portfolio) {
                portfolio.status = 'done';
                portfolio.statusLabel = '정산 완료';
                portfolio.dday = '완료';
                portfolio.escrowStatus = '정산 완료';
            }

            renderFunderSettlementList();
            renderFunderPortfolioList();
            closeModal();
            setTimeout(() => openInfoModal('정산 완료', `${id} 건의 ${amount} RLUSD가 연결된 지갑으로 정산되었습니다.`), 250);
        }


        function renderTabs(tabs) {
            document.getElementById('tab-headers').innerHTML = tabs.map((t, i) => `
                <button id="tab-btn-${i}" onclick="switchTab(${i})" class="flex-1 py-4 text-sm transition ${i===0?'text-blue-600 border-b-2 border-blue-600 bg-white fw-bold':'text-gray-400 bg-white'}">${t}</button>
            `).join('');
            switchTab(0);
        }

        function switchTab(idx) {
            document.querySelectorAll('[id^="tab-btn-"]').forEach((btn, i) => {
                if(i === idx) btn.className = "flex-1 py-4 text-sm text-blue-600 border-b-2 border-blue-600 bg-white fw-bold transition";
                else btn.className = "flex-1 py-4 text-sm text-gray-400 bg-white hover:text-gray-700 transition";
            });

            const content = document.getElementById('tab-content');
            
            if (role === 'funder') {
                if (idx === 0) renderFunderPortfolioTab();
                else renderFunderSettlementTab();
                return;
            } else if (role === 'registrar') {
                if (idx === 0) renderRegistrarReceiptTab();
                else renderRegistrarStatusTab();
            } else if (role === 'payer') {
                if (idx === 0) {
                    content.innerHTML = `
                        <div class="flex items-center justify-between p-6 bg-red-50 border border-red-100 rounded-2xl mb-8">
                            <div>
                                <h3 class="text-red-600 fw-bold text-sm">⚠️ 지급 기일 임박</h3>
                                <p class="text-sm text-red-400 mt-0.5">7일 이내 만기가 도래하는 채무가 있습니다.</p>
                            </div>
                            <div class="text-right text-red-600">
                                <p class="text-xs uppercase mb-0.5">미결제액</p>
                                <p class="text-2xl fw-bold tracking-tight">₩50,000,000</p>
                            </div>
                        </div>

                        <div class="mb-8">
                            <div class="flex items-center justify-between mb-4">
                                <h4 class="fw-bold text-xs text-gray-400 uppercase tracking-widest">채무 현황</h4>
                                
                            </div>
                            <div id="payer-debt-filters" class="flex flex-wrap gap-2 mb-4"></div>
                            <div class="overflow-x-auto border border-gray-100 rounded-2xl">
                                <table class="w-full text-left text-sm">
                                    <thead class="text-gray-400 text-xs uppercase border-b border-gray-100 bg-gray-50">
                                        <tr>
                                            <th class="py-3 px-4 fw-bold">ID</th>
                                            <th class="py-3 px-4 fw-bold">기업</th>
                                            <th class="py-3 px-4 fw-bold">금액</th>
                                            <th class="py-3 px-4 fw-bold">만기/상태</th>
                                            <th class="py-3 px-4 fw-bold">진행</th>
                                            <th class="py-3 px-4 text-right fw-bold">액션</th>
                                        </tr>
                                    </thead>
                                    <tbody id="payer-debt-list" class="divide-y divide-gray-50 text-gray-700"></tbody>
                                </table>
                            </div>
                        </div>

                        <div class="p-6 border border-gray-100 rounded-2xl">
                            <h4 class="fw-bold text-xs text-gray-400 mb-4 uppercase tracking-widest">주요 협력사 채무 비중</h4>
                            <div class="space-y-4">
                                <div>
                                    <div class="flex justify-between text-sm mb-1"><span class="text-gray-900">(주)한빛테크</span><span class="text-gray-400">40%</span></div>
                                    <div class="w-full bg-gray-100 h-1.5 rounded-full"><div class="bg-blue-600 h-full w-[40%]"></div></div>
                                </div>
                                <div>
                                    <div class="flex justify-between text-sm mb-1"><span class="text-gray-900">기타 협력사</span><span class="text-gray-400">60%</span></div>
                                    <div class="w-full bg-gray-100 h-1.5 rounded-full"><div class="bg-gray-300 h-full w-[60%]"></div></div>
                                </div>
                            </div>
                        </div>`;
                    renderPayerDebtList();
                } else {
                    content.innerHTML = `
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-sm">
                                <thead class="text-gray-400 text-xs uppercase border-b border-gray-100">
                                    <tr><th class="pb-3 fw-bold">지급 대상</th><th class="pb-3 fw-bold">상태</th><th class="pb-3 text-right fw-bold">예정일/금액</th></tr>
                                </thead>
                                <tbody class="divide-y divide-gray-50 text-gray-700">
                                    <tr>
                                        <td class="py-4">(주)한빛테크</td>
                                        <td class="py-4"><span class="bg-red-50 text-red-500 badge-nowrap fw-bold px-2.5 py-1 rounded-full border border-red-100">만기 임박</span></td>
                                        <td class="py-4 text-right text-red-600 fw-bold">D-3 / ₩20,000,000</td>
                                    </tr>
                                    <tr>
                                        <td class="py-4">기타 협력사</td>
                                        <td class="py-4"><span class="bg-orange-50 text-orange-600 badge-nowrap fw-bold px-2.5 py-1 rounded-full border border-orange-100">지급 대기</span></td>
                                        <td class="py-4 text-right text-gray-700 fw-bold">D-15 / ₩30,000,000</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>`;
                }
            }
        }

        /* ── 정산 상세 모달 (F2/F7) ── */
        function openSettlementDetail(item, amount, datetime, txHash, wallet) {
            const con = document.getElementById('modal-container');
            con.innerHTML = `<h3 class="text-lg fw-bold mb-5">정산 상세</h3><div class="space-y-3 mb-6 bg-gray-50 p-5 rounded-xl text-sm"><div class="flex justify-between border-b pb-2.5"><span class="text-gray-400">항목</span><span class="fw-bold text-gray-900">${item}</span></div><div class="flex justify-between border-b pb-2.5"><span class="text-gray-400">정산 금액</span><span class="fw-bold text-blue-600">+ ${amount} RLUSD</span></div><div class="flex justify-between border-b pb-2.5"><span class="text-gray-400">처리 일시</span><span class="fw-bold text-gray-900">${datetime}</span></div><div class="border-b pb-2.5"><p class="text-gray-400 mb-1">Tx Hash</p><p class="wallet-addr fw-bold">${txHash}</p></div><div><p class="text-gray-400 mb-1">출금 주소</p><p class="wallet-addr fw-bold">${wallet}</p></div></div><button onclick="closeModal()" class="w-full h-10 flex items-center justify-center bg-gray-900 text-white rounded-xl text-sm fw-bold">닫기</button>`;
            showModal();
        }

        /* ── 지갑 연결: 전체 역할 공통 지갑 수집 페이지 이동 ── */
        let walletConnected = false;
        function toggleWallet() {
            window.location.href = 'wallet-collect.html';
        }

        /* ── 출금 모달: 지갑 주소 + 네트워크 정보 포함 ── */
        function openActionModal(type) {
            const con = document.getElementById('modal-container');
            if(type === 'withdraw') {
                con.innerHTML = `
                    <h3 class="text-lg fw-bold mb-6 text-center text-gray-900">지갑 출금</h3>

                    <div class="bg-gray-50 p-5 rounded-2xl mb-4 border border-gray-100">
                        <p class="text-xs text-gray-400 mb-1 uppercase">출금 네트워크</p>
                        <p class="text-sm fw-bold text-gray-900">XRPL Mainnet</p>
                    </div>

                    <div class="bg-gray-50 p-5 rounded-2xl mb-4 border border-gray-100">
                        <p class="text-xs text-gray-400 mb-1 uppercase">출금 지갑 주소</p>
                        <p class="wallet-addr fw-bold">${WALLET_ADDR}</p>
                    </div>

                    <div class="bg-blue-50 p-5 rounded-2xl mb-6 border border-blue-100 text-center">
                        <p class="text-xs text-blue-600 mb-1 uppercase">출금 예정 금액</p>
                        <p class="text-2xl fw-bold text-blue-600 tracking-tight">50,155 <span class="text-sm text-blue-400">RLUSD</span></p>
                    </div>

                    <div class="flex gap-3">
                        <button onclick="closeModal()" class="flex-1 h-10 flex items-center justify-center bg-gray-100 text-gray-400 rounded-xl text-sm fw-bold">취소</button>
                        <button onclick="executeAction()" class="flex-1 h-10 flex items-center justify-center bg-blue-600 text-white rounded-xl text-sm fw-bold transition hover:bg-blue-700">출금 실행</button>
                    </div>`;
                showModal();
            }
        }

        function executeAction() { 
            closeModal(); 
            setTimeout(() => { openInfoModal("출금 완료", "50,155 RLUSD가 연결된 XRPL 지갑으로 전송되었습니다."); }, 300); 
        }
        
        function openInfoModal(t, c) { 
            const con = document.getElementById('modal-container'); 
            con.innerHTML = `<h3 class="text-lg fw-bold text-blue-600 mb-4">${t}</h3><div class="bg-gray-50 p-5 rounded-xl mb-6 text-sm text-gray-700 text-wrap-safe">${c}</div><button onclick="closeModal()" class="w-full h-10 flex items-center justify-center bg-blue-600 text-white rounded-xl text-sm fw-bold">확인</button>`; 
            showModal(); 
        }
        
        function openRWADetail(id, title, apy, invest, maturity, issuer, status) { 
            const statusColor = status === '만기 임박' ? 'text-red-500' : 'text-blue-600';
            const con = document.getElementById('modal-container'); 
            con.innerHTML = `<h3 class="text-lg fw-bold mb-5">${title}</h3><div class="space-y-3 mb-6 bg-gray-50 p-5 rounded-xl text-sm"><div class="flex justify-between border-b pb-2.5"><span class="text-gray-400">ID</span><span class="fw-bold text-gray-900">#${id}</span></div><div class="flex justify-between border-b pb-2.5"><span class="text-gray-400">발행기업</span><span class="fw-bold text-gray-900">${issuer}</span></div><div class="flex justify-between border-b pb-2.5"><span class="text-gray-400">만기일</span><span class="fw-bold text-gray-900">${maturity}</span></div><div class="flex justify-between border-b pb-2.5"><span class="text-gray-400">투자 금액</span><span class="fw-bold text-gray-900">${invest} RLUSD</span></div><div class="flex justify-between border-b pb-2.5"><span class="text-gray-400">예상 수익률</span><span class="fw-bold text-blue-600">${apy}</span></div><div class="flex justify-between"><span class="text-gray-400">상태</span><span class="fw-bold ${statusColor}">${status}</span></div></div><button onclick="closeModal()" class="w-full h-10 flex items-center justify-center bg-gray-900 text-white rounded-xl text-sm fw-bold">닫기</button>`; 
            showModal(); 
        }
        
        function openReadHistory() { 
            const con = document.getElementById('modal-container');
            const body = historyAlerts.length
                ? historyAlerts.map((a, i) => `
                    <button onclick="openHistoryAlert(${i})" class="w-full text-left p-4 bg-gray-50 hover:bg-blue-50 border border-gray-100 hover:border-blue-100 rounded-xl transition">
                        <div class="flex items-start justify-between gap-3">
                            <div class="min-w-0 flex-1">
                                <p class="text-sm fw-bold text-gray-900 mb-1 text-wrap-safe">${a.title}</p>
                                <p class="text-xs text-gray-400 text-wrap-safe">${a.content}</p>
                            </div>
                            <span class="text-xs text-gray-300 whitespace-nowrap">${a.time}</span>
                        </div>
                    </button>`).join('')
                : '<p class="text-center py-8 text-gray-400 text-sm">내역이 없습니다.</p>';
            con.innerHTML = `<h3 class="text-lg fw-bold mb-5">확인한 알림</h3><div class="space-y-2.5 mb-6 max-h-[360px] overflow-y-auto">${body}</div><button onclick="closeModal()" class="w-full h-10 flex items-center justify-center bg-gray-100 fw-bold text-gray-700 rounded-xl text-sm">닫기</button>`; 
            showModal(); 
        }

        function openHistoryAlert(index) {
            const data = historyAlerts[index];
            if (!data) return;
            openInfoModal(data.title, data.content);
        }
        
        function showModal() { 
            const o = document.getElementById('modal-overlay'), c = document.getElementById('modal-container'); 
            o.classList.remove('hidden'); 
            document.body.style.overflow = 'hidden';
            setTimeout(() => { c.classList.remove('scale-95', 'opacity-0'); c.classList.add('scale-100', 'opacity-100'); }, 10); 
        }
        
        function closeModal() { 
            const c = document.getElementById('modal-container'); 
            c.classList.remove('scale-100', 'opacity-100'); c.classList.add('scale-95', 'opacity-0'); 
            setTimeout(() => { document.getElementById('modal-overlay').classList.add('hidden'); document.body.style.overflow = ''; }, 200); 
        }
        
        window.onload = init;
    </script>
</body>
</html>
